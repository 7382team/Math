<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>統計圖表與資料整理 練習</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@400;500;600;700&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{--ink:#1b1d26;--ink-soft:#5b606f;--pos:#2563eb;--neg:#ea580c;--right:#16a34a;--wrong:#e11d48;
    --line:#e6e8ef;--card:#ffffff;--key:#f3f5f9;--key-press:#e3e7f0;--bg:#f7f8fb;--subj:#2563eb;}
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;height:100%;}
  body{font-family:'Noto Sans TC',system-ui,-apple-system,sans-serif;color:var(--ink);
    background:linear-gradient(var(--line) 1px,transparent 1px) 0 0/28px 28px,linear-gradient(90deg,var(--line) 1px,transparent 1px) 0 0/28px 28px,var(--bg);
    display:flex;justify-content:center;padding:14px;}
  .wrap{width:100%;max-width:440px;display:flex;flex-direction:column;gap:14px;}
  header{display:flex;align-items:baseline;justify-content:space-between;padding:2px 2px 0;}
  header h1{font-size:18px;font-weight:700;margin:0;letter-spacing:.5px;}
  header .sub{font-size:12px;color:var(--ink-soft);}
  .streak{font-family:'Lexend',sans-serif;font-size:13px;color:var(--ink-soft);} .streak b{color:var(--ink);font-weight:600;}
  .levels{display:flex;gap:8px;}
  .lv{flex:1;border:none;border-radius:12px;padding:10px 0;font-family:inherit;font-size:14px;font-weight:500;
      background:var(--card);color:var(--ink-soft);border:1.5px solid var(--line);cursor:pointer;transition:.15s;}
  .lv.active{background:var(--ink);color:#fff;border-color:var(--ink);}
  .card{background:var(--card);border:1.5px solid var(--line);border-radius:20px;padding:20px 18px;box-shadow:0 8px 24px -18px rgba(20,25,50,.35);}
  .eq{text-align:center;min-height:44px;}
  .eq .tag{display:inline-block;font-size:11px;color:var(--subj);background:#eaf0fb;border-radius:6px;padding:2px 8px;margin-bottom:10px;letter-spacing:1px;font-weight:500;}
  .eq .data{font-family:'Lexend','Noto Sans TC',sans-serif;font-variant-numeric:tabular-nums;font-size:22px;font-weight:600;letter-spacing:1px;line-height:1.5;word-spacing:2px;}
  .eq .ask{font-size:15px;color:var(--ink-soft);margin-top:10px;}
  .eq .q{color:var(--pos);font-weight:700;}
  table.freq{margin:6px auto 0;border-collapse:collapse;font-family:'Lexend','Noto Sans TC',sans-serif;font-variant-numeric:tabular-nums;}
  table.freq th,table.freq td{border:1.5px solid var(--line);padding:6px 12px;font-size:15px;}
  table.freq th{background:#f3f5f9;color:var(--ink-soft);font-weight:500;font-size:13px;}
  table.freq td.hi{color:var(--pos);font-weight:700;}
  .ans{margin-top:16px;height:56px;border-radius:14px;border:2px solid var(--line);display:flex;align-items:center;justify-content:center;
       font-family:'Lexend',sans-serif;font-size:28px;font-variant-numeric:tabular-nums;transition:.15s;background:#fbfcfe;}
  .ans.empty{color:#b7bccb;}
  .ans.ok{border-color:var(--right);color:var(--right);background:#f0fdf4;}
  .ans.no{border-color:var(--wrong);color:var(--wrong);background:#fff1f4;}
  @keyframes shake{10%,90%{transform:translateX(-1px)}30%,70%{transform:translateX(4px)}50%{transform:translateX(-6px)}}
  .shake{animation:shake .35s;}
  .explain{margin-top:16px;border-top:1.5px dashed var(--line);padding-top:16px;display:none;}
  .explain.show{display:block;}
  .steps{font-family:'Lexend','Noto Sans TC',sans-serif;font-variant-numeric:tabular-nums;font-size:16px;line-height:1.95;color:var(--ink);}
  .steps .lead{color:var(--ink-soft);font-family:'Noto Sans TC';font-size:13px;margin-right:6px;}
  .steps .res{color:var(--right);font-weight:700;}
  .tip{margin-top:10px;font-size:13px;color:var(--ink-soft);background:#f4f6fb;border-radius:10px;padding:9px 12px;line-height:1.6;}
  .pad{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;}
  .key{border:none;border-radius:14px;background:var(--key);color:var(--ink);font-family:'Lexend',sans-serif;font-size:24px;font-weight:500;height:56px;cursor:pointer;transition:.08s;user-select:none;}
  .key:active{background:var(--key-press);transform:scale(.96);}
  .key.sign{color:var(--neg);font-weight:600;} .key.del{color:var(--ink-soft);font-size:22px;}
  .go{border:none;border-radius:16px;height:56px;width:100%;font-family:inherit;font-size:18px;font-weight:700;letter-spacing:1px;background:var(--ink);color:#fff;cursor:pointer;transition:.12s;}
  .go:active{transform:scale(.98);} .go.next{background:var(--pos);} .go:disabled{opacity:.4;}
</style>
<script type="application/json" id="unit-meta">
{
  "id": "statistics",
  "title": "統計圖表與資料整理",
  "subject": "數學",
  "grade": "國一",

</head>
<body>
<div class="wrap">
  <header>
    <div><h1>統計圖表與資料整理</h1><div class="sub">隨機出題 · 逐步解說</div></div>
    <div class="streak">連對 <b id="streak">0</b></div>
  </header>
  <div class="levels">
    <button class="lv active" data-lv="basic">基礎</button>
    <button class="lv" data-lv="adv">進階</button>
    <button class="lv" data-lv="mix">混合</button>
  </div>
  <div class="card">
    <div class="eq" id="eq"></div>
    <div class="ans empty" id="ans">?</div>
    <div class="explain" id="explain"><div class="steps" id="steps"></div><div class="tip" id="tip"></div></div>
  </div>
  <div class="pad" id="pad">
    <button class="key" data-k="7">7</button><button class="key" data-k="8">8</button><button class="key" data-k="9">9</button>
    <button class="key" data-k="4">4</button><button class="key" data-k="5">5</button><button class="key" data-k="6">6</button>
    <button class="key" data-k="1">1</button><button class="key" data-k="2">2</button><button class="key" data-k="3">3</button>
    <button class="key sign" data-k="sign">±</button><button class="key" data-k="0">0</button><button class="key del" data-k="del">⌫</button>
  </div>
  <button class="go" id="go">檢查</button>
</div>

<script>
const rand=(a,b)=>Math.floor(Math.random()*(b-a+1))+a;
function shuffle(a){ a=a.slice(); for(let i=a.length-1;i>0;i--){ const j=rand(0,i); const t=a[i]; a[i]=a[j]; a[j]=t; } return a; }
let level='basic', problem=null, entry='', answered=false, streak=0;

function genMode(){ const mv=rand(2,9); const used=new Set([mv]); const others=[]; const nOther=rand(3,4);
  for(let i=0;i<nOther;i++){ let x; do{ x=rand(2,9); }while(used.has(x)); used.add(x); others.push(x); }
  let data=[mv,mv,mv].concat(others);
  return {kind:'mode', data:shuffle(data), answer:mv}; }
function genRange(){ const data=[]; for(let i=0;i<5;i++) data.push(rand(3,30));
  const mx=Math.max.apply(null,data), mn=Math.min.apply(null,data); if(mx===mn) return genRange();
  return {kind:'range', data, answer:mx-mn}; }
function genMean(){ const n=rand(4,5), m=rand(5,14); const data=[]; let sum=0;
  for(let i=0;i<n-1;i++){ const v=rand(1,20); data.push(v); sum+=v; }
  const last=n*m-sum; if(last<1||last>25) return genMean(); data.push(last);
  return {kind:'mean', data:shuffle(data), answer:m}; }
function genMedian(){ const n=Math.random()<0.5?5:7; const data=[]; for(let i=0;i<n;i++) data.push(rand(2,30));
  const sorted=data.slice().sort((a,b)=>a-b); return {kind:'median', data, answer:sorted[(n-1)/2]}; }
function genFreqTotal(){ const classes=['0~9','10~19','20~29','30~39']; const freqs=classes.map(()=>rand(2,12));
  return {kind:'freqTotal', classes, freqs, answer:freqs.reduce((s,x)=>s+x,0)}; }
function genFreqMissing(){ const classes=['甲','乙','丙','丁']; const freqs=classes.map(()=>rand(3,12));
  const total=freqs.reduce((s,x)=>s+x,0), hide=rand(0,classes.length-1);
  return {kind:'freqMissing', classes, freqs, hide, total, answer:freqs[hide]}; }
function makeProblem(lv){
  const pool = lv==='basic' ? ['mode','range','freqTotal']
            : lv==='adv'   ? ['mean','median','freqMissing']
            : ['mode','range','mean','median','freqTotal','freqMissing'];
  const t=pool[rand(0,pool.length-1)];
  return t==='mode'?genMode():t==='range'?genRange():t==='mean'?genMean()
       : t==='median'?genMedian():t==='freqTotal'?genFreqTotal():genFreqMissing();
}

function freqTable(p, hide){
  let head='<tr><th>組別</th>'+p.classes.map(c=>'<th>'+c+'</th>').join('')+'</tr>';
  let body='<tr><td>次數</td>'+p.freqs.map((f,i)=>(hide!=null&&i===hide)?'<td class="hi">?</td>':'<td>'+f+'</td>').join('')+'</tr>';
  return '<table class="freq">'+head+body+'</table>';
}
function qText(){ const p=problem;
  if(p.kind==='mode') return '資料：'+p.data.join('、')+'，眾數＝？';
  if(p.kind==='range') return '資料：'+p.data.join('、')+'，全距＝？';
  if(p.kind==='mean') return '資料：'+p.data.join('、')+'，平均數＝？';
  if(p.kind==='median') return '資料：'+p.data.join('、')+'，中位數＝？';
  if(p.kind==='freqTotal') return '次數分配：'+p.classes.map((c,i)=>c+' 組 '+p.freqs[i]+' 人').join('、')+'，總人數＝？';
  return '總人數 '+p.total+' 人，'+p.classes.map((c,i)=>c+' 組 '+(i===p.hide?'?':p.freqs[i])+' 人').join('、')+'，求 '+p.classes[p.hide]+' 組人數＝？';
}
function eqHTML(){ const p=problem; const tag=t=>'<span class="tag">'+t+'</span>';
  if(p.kind==='mode') return tag('眾數')+'<div class="data">'+p.data.join('　')+'</div><div class="ask">出現次數<b>最多</b>的數＝<span class="q">?</span></div>';
  if(p.kind==='range') return tag('全距')+'<div class="data">'+p.data.join('　')+'</div><div class="ask">全距（最大−最小）＝<span class="q">?</span></div>';
  if(p.kind==='mean') return tag('平均數')+'<div class="data">'+p.data.join('　')+'</div><div class="ask">這 '+p.data.length+' 筆的平均數＝<span class="q">?</span></div>';
  if(p.kind==='median') return tag('中位數')+'<div class="data">'+p.data.join('　')+'</div><div class="ask">由小到大排序後最中間的數＝<span class="q">?</span></div>';
  if(p.kind==='freqTotal') return tag('次數分配表')+freqTable(p,null)+'<div class="ask">全部組的<b>總人數</b>＝<span class="q">?</span></div>';
  return tag('次數分配表')+freqTable(p,p.hide)+'<div class="ask">總人數共 <b>'+p.total+'</b> 人，「'+p.classes[p.hide]+'」組人數＝<span class="q">?</span></div>';
}
function render(){ document.getElementById('eq').innerHTML=eqHTML(); entry=''; answered=false;
  const ans=document.getElementById('ans'); ans.textContent='?'; ans.className='ans empty';
  document.getElementById('explain').className='explain';
  const go=document.getElementById('go'); go.textContent='檢查'; go.className='go'; go.disabled=false; }
function showEntry(){ const ans=document.getElementById('ans');
  if(entry===''||entry==='-'){ ans.textContent = entry==='-'?'−':'?'; ans.className='ans empty'; return; }
  ans.textContent=entry.replace('-','−'); ans.className='ans'; }

function buildSteps(){ const p=problem;
  if(p.kind==='mode'){ const c={}; p.data.forEach(v=>c[v]=(c[v]||0)+1);
    return `<div><span class="lead">數次數</span>${p.answer} 出現 ${c[p.answer]} 次，最多</div><div>眾數 ＝ <span class="res">${p.answer}</span></div>`; }
  if(p.kind==='range'){ const mx=Math.max.apply(null,p.data), mn=Math.min.apply(null,p.data);
    return `<div><span class="lead">最大、最小</span>最大 ${mx}、最小 ${mn}</div><div>全距 ＝ ${mx} − ${mn} ＝ <span class="res">${p.answer}</span></div>`; }
  if(p.kind==='mean'){ const sum=p.data.reduce((s,x)=>s+x,0);
    return `<div><span class="lead">總和</span>${p.data.join(' + ')} ＝ ${sum}</div><div>平均 ＝ ${sum} ÷ ${p.data.length} ＝ <span class="res">${p.answer}</span></div>`; }
  if(p.kind==='median'){ const sorted=p.data.slice().sort((a,b)=>a-b);
    return `<div><span class="lead">排序</span>${sorted.join('、')}</div><div>共 ${sorted.length} 筆，最中間 ＝ <span class="res">${p.answer}</span></div>`; }
  if(p.kind==='freqTotal'){ return `<div><span class="lead">各組相加</span>${p.freqs.join(' + ')} ＝ <span class="res">${p.answer}</span></div>`; }
  const others=p.freqs.filter((f,i)=>i!==p.hide);
  return `<div><span class="lead">其他組相加</span>${others.join(' + ')} ＝ ${others.reduce((s,x)=>s+x,0)}</div><div>缺的組 ＝ ${p.total} − ${others.reduce((s,x)=>s+x,0)} ＝ <span class="res">${p.answer}</span></div>`;
}
function buildTip(){ const p=problem;
  if(p.kind==='mode') return '眾數＝出現次數最多的數（可能不只一個）。';
  if(p.kind==='range') return '全距＝最大值 − 最小值，代表資料分散的範圍。';
  if(p.kind==='mean') return '平均數＝所有資料的總和 ÷ 資料筆數。';
  if(p.kind==='median') return '中位數＝資料由小到大排序後，最中間的那一筆。';
  if(p.kind==='freqTotal') return '總次數（總人數）＝各組次數全部相加。';
  return '某組次數＝總次數 − 其他各組次數的和。';
}

function check(){ if(entry===''||entry==='-') return; answered=true;
  const val=parseInt(entry,10), ans=document.getElementById('ans'), correct=val===problem.answer;
  ans.className='ans '+(correct?'ok':'no'); ans.textContent=entry.replace('-','−');
  if(!correct){ ans.classList.add('shake'); setTimeout(()=>ans.classList.remove('shake'),400); }
  streak=correct?streak+1:0; document.getElementById('streak').textContent=streak;
  if(window.parent!==window){ window.parent.postMessage({type:'unit-progress',unitDone:1,unitCorrect:correct?1:0},'*');
    if(!correct){ window.parent.postMessage({type:'unit-mistake',q:qText(),ans:String(problem.answer),given:entry.replace('-','−'),steps:buildSteps(),tip:buildTip()},'*'); } }
  document.getElementById('steps').innerHTML=buildSteps();
  document.getElementById('tip').textContent=buildTip();
  document.getElementById('explain').className='explain show';
  const go=document.getElementById('go'); go.textContent='下一題'; go.className='go next';
}
function next(){ problem=makeProblem(level); render(); }

document.getElementById('pad').addEventListener('click',e=>{ const b=e.target.closest('.key'); if(!b||answered) return; const k=b.dataset.k;
  if(k==='del') entry=entry.slice(0,-1);
  else if(k==='sign') entry=entry.startsWith('-')?entry.slice(1):'-'+entry;
  else { if(entry.replace('-','').length<3) entry+=k; }
  showEntry(); });
document.getElementById('go').addEventListener('click',()=> answered?next():check());
document.querySelectorAll('.lv').forEach(b=>b.addEventListener('click',()=>{
  document.querySelectorAll('.lv').forEach(x=>x.classList.remove('active')); b.classList.add('active'); level=b.dataset.lv; next(); }));
document.addEventListener('keydown',e=>{ if(e.key==='Enter'){ answered?next():check(); return; } if(answered) return;
  if(/^[0-9]$/.test(e.key)){ if(entry.replace('-','').length<3) entry+=e.key; showEntry(); }
  else if(e.key==='-'){ entry=entry.startsWith('-')?entry.slice(1):'-'+entry; showEntry(); }
  else if(e.key==='Backspace'){ entry=entry.slice(0,-1); showEntry(); } });
(function(){ const lv=new URLSearchParams(location.search).get('level');
  if(lv==='basic'||lv==='adv'||lv==='mix'){ level=lv; document.querySelectorAll('.lv').forEach(b=>b.classList.toggle('active',b.dataset.lv===lv)); } })();
next();
</script>
<script>
/* ===== 遊戲指令介面：hint（口訣，不洩答案）===== */
(function(){
  function box(){var h=document.getElementById('game-hint');if(!h){h=document.createElement('div');h.id='game-hint';h.style.cssText='margin-top:10px;font-size:13px;background:#fff7ed;border:1.5px solid #fed7aa;color:#9a3412;border-radius:10px;padding:9px 12px;line-height:1.6';var eq=document.getElementById('eq');if(eq&&eq.parentNode){eq.parentNode.insertBefore(h,eq.nextSibling);}else{(document.querySelector('.card')||document.body).appendChild(h);}}return h;}
  function showHint(){if(typeof answered!=='undefined'&&answered)return;var t='';try{t=buildTip();}catch(e){}if(!t)return;box().innerHTML='💡 提示：'+t;}
  function eliminateOne(){showHint();}
  if(typeof next==='function'){var _n=next;next=function(){var h=document.getElementById('game-hint');if(h)h.remove();return _n.apply(this,arguments);};}
  window.addEventListener('message',function(e){var d=e.data;if(!d||d.type!=='unit-command')return;if(d.cmd==='hint')showHint();if(d.cmd==='fifty')eliminateOne();});
  if(window.parent!==window){window.parent.postMessage({type:'unit-ready',supports:['hint']},'*');}
})();
</script>
<script>
/* ===== exam-mode-hook：綜合測驗模式，?exam=1 時交由外層 runner 控制 ===== */
(function(){
  if(new URLSearchParams(location.search).get('exam')!=='1') return;
  document.documentElement.setAttribute('data-exam','1');
  var lv=document.querySelector('.levels'); if(lv) lv.style.display='none';
  var go=document.getElementById('go'); if(!go) return;
  function upd(){ var isNext=go.classList.contains('next')||(go.textContent||'').indexOf('下一題')>=0;
    go.style.display=isNext?'none':''; }
  upd();
  try{ new MutationObserver(upd).observe(go,{attributes:true,childList:true,characterData:true,subtree:true}); }catch(e){}
})();
</script>
</body>
