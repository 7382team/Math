<script>
/* ===== bank-start ===== 原創題庫（論語選）：字詞義、文意翻譯、國學常識、成語 */
const BANK=[{"level":"basic","topic":"作者出處","q":"〈賣油翁〉一文選自歐陽修的哪一部著作？","choices":["《六一詩話》","《歸田錄》","《世說新語》","《夢溪筆談》"],"answer":1,"explain":"〈賣油翁〉選自歐陽修晚年所作的《歸田錄》卷一。《六一詩話》也是歐陽修的作品，但內容以詩人軼事與詩歌評論為主；《世說新語》為南朝劉義慶所編，《夢溪筆談》為北宋沈括所著，皆非本文出處。"},{"level":"basic","topic":"作者生平","q":"歐陽修晚年自號為下列何者？","choices":["香山居士","東坡居士","易安居士","六一居士"],"answer":3,"explain":"歐陽修字永叔，號醉翁，晚年自號「六一居士」，取藏書一萬卷、金石遺文一千卷、琴一張、棋一局、酒一壺，加上「吾一老翁」共六個「一」之意。香山居士為白居易，東坡居士為蘇軾，易安居士為李清照。"},{"level":"basic","topic":"文體與出處性質","q":"《歸田錄》一書的性質，最接近下列何者？","choices":["逐年記事的編年體史書","以人物為綱的紀傳體史書","記錄士大夫軼事見聞的筆記","彙集歷代詩歌的總集"],"answer":2,"explain":"《歸田錄》屬筆記體，記載北宋士大夫階層的日常軼事與朝廷舊聞，以助談資，並非正式史書，也不是詩歌總集。原書各則本無標題，「賣油翁」之題為後人所加。"},{"level":"basic","topic":"字詞義","q":"「公亦以此自矜」句中的「矜」字，意思是什麼？","choices":["自誇","憐憫","慎重","怨恨"],"answer":0,"explain":"「矜」在此作「自誇、自負」解，指陳堯咨因擅長射箭而自我誇耀。「矜」另有「憐憫」之義（如「矜憐」）與「慎重」之義（如「矜持」），但在本句中皆不合文意。"},{"level":"basic","topic":"字詞義","q":"「有賣油翁釋擔而立」句中的「釋」字，應解釋為？","choices":["解釋、說明","釋放犯人","放下","丟棄不要"],"answer":2,"explain":"「釋」為「放下」之意，「釋擔」即放下肩上挑的擔子。賣油翁只是暫時把擔子放下站著看，並非丟棄，也與「解釋」「釋放」無關。"},{"level":"basic","topic":"字詞義","q":"「睨之，久而不去」句中的「睨」字，是什麼意思？","choices":["目不轉睛地注視","斜著眼看","偷偷地從縫隙窺視","仰起頭來觀望"],"answer":1,"explain":"「睨」是斜著眼睛看，帶有不甚在意、不以為然的意味，正好呼應下文賣油翁「但微頷之」的態度，也為後面的衝突埋下伏筆。"},{"level":"basic","topic":"字詞義","q":"「但微頷之」句中的「頷」字，其動作為何？","choices":["搖頭","低頭歎息","皺起眉頭","點頭"],"answer":3,"explain":"「頷」本指下巴，在此作動詞用，指微微點頭。「但微頷之」即「只是微微點點頭」，表示賣油翁對陳堯咨的射技僅表示一點認可，並無驚歎讚佩之情。"},{"level":"basic","topic":"字詞義","q":"「爾安敢輕吾射」句中的「安」字，意思是？","choices":["怎麼","安穩","安置","於是"],"answer":0,"explain":"「安」在此為疑問副詞，作「怎麼、哪裡」解，表反詰語氣，全句意為「你怎麼敢輕視我的射箭本領」。此為文言常見用法，如「安能摧眉折腰事權貴」。"},{"level":"basic","topic":"字詞義","q":"「徐以杓酌油瀝之」句中的「徐」字，應作何解？","choices":["立刻、馬上","慢慢地","穩穩地","悄悄地"],"answer":1,"explain":"「徐」是「緩慢地」之意。賣油翁慢慢地用杓子舀油注入葫蘆，油從錢孔穿過而銅錢不沾濕，「徐」字正寫出他從容不迫、駕輕就熟的模樣。"},{"level":"basic","topic":"字詞義","q":"「康肅笑而遣之」句中的「遣之」，意思是什麼？","choices":["派遣他去辦事","出言責備他","贈送禮物給他","打發他離開"],"answer":3,"explain":"「遣」在此為「打發、使之離去」，「遣之」即打發賣油翁走。此句寫陳堯咨聽完道理後心服口服，笑著讓老翁離去，情緒已由「忿然」轉為釋然。"},{"level":"basic","topic":"字詞義","q":"「乃取一葫蘆置於地，以錢覆其口」句中的「覆」字，意思是？","choices":["翻倒過來","重複再做一次","蓋住","回覆、答覆"],"answer":2,"explain":"「覆」在此作「覆蓋、蓋住」解，「以錢覆其口」即用一枚銅錢蓋住葫蘆的口。正因錢蓋在口上，油必須穿過錢孔才能入葫蘆，才顯出「錢不濕」的難得。「覆」另有「傾覆」「答覆」等義，於此不合。"},{"level":"basic","topic":"主旨","q":"下列何者最能說明本文的主旨？","choices":["勸人及早立志，珍惜光陰","說明射箭必須勤練才能百發百中","技藝出於熟練，不應恃技自傲","諷刺賣油翁不知天高地厚"],"answer":2,"explain":"本文藉賣油翁酌油瀝錢的絕技，說明任何技藝都是「惟手熟爾」，並非天賦異稟；同時透過陳堯咨由自矜、忿然到笑而遣之的轉變，勸戒世人不可恃技驕矜。射箭只是舉例，並非全文主旨所在。"},{"level":"adv","topic":"句子翻譯","q":"「公亦以此自矜」一句，翻譯最恰當的是？","choices":["陳堯咨也因為這項本領而自誇","陳堯咨也因此更加謹慎小心","陳堯咨也拿這件事去憐惜別人","陳堯咨也用這件事來勉勵自己"],"answer":0,"explain":"「以此」指憑著善射、當世無雙的本領，「自矜」即自我誇耀。全句意為「他也因為這項本領而自誇」，寫出陳堯咨恃技而驕的心態，是後文衝突的起因。"},{"level":"adv","topic":"句子翻譯","q":"「見其發矢十中八九，但微頷之」的白話翻譯，何者正確？","choices":["看見他射出的箭十次有八九次落空，只好微微搖頭","看見他射箭十分精準，於是連連出聲稱讚","看見他射出的箭十支中了八九支，只是微微點點頭","看見他射箭十發全中，忍不住低頭佩服"],"answer":2,"explain":"「發矢」是射出箭，「十中八九」指十支箭射中八九支，「但」是「只、僅」，「微頷之」是微微點頭。賣油翁的反應相當淡漠，並未出聲稱讚，更非搖頭或佩服。"},{"level":"adv","topic":"句子翻譯","q":"賣油翁所說「無他，但手熟爾」，語譯最正確的是？","choices":["沒有其他人，只有我的手最熟練","沒有別的辦法，只好用手慢慢摸索","不是別人教的，只是我自己熟悉罷了","沒有別的訣竅，只是手法熟練罷了"],"answer":3,"explain":"「無他」指沒有別的奧妙、訣竅，「但」是「只不過」，「爾」通「耳」，是句末語氣詞，相當於「罷了」。此句是全文的關鍵，點出「熟能生巧」的道理。"},{"level":"adv","topic":"句子翻譯","q":"「爾安敢輕吾射」一句，翻譯最恰當的是？","choices":["你怎麼能安然看待我的射箭","你怎麼敢輕視我的射箭本領","你安心地看輕我的箭術好了","我怎麼敢輕忽你所說的話"],"answer":1,"explain":"「爾」為第二人稱「你」，「安」是「怎麼」，「輕」作動詞用，意為「輕視、看不起」，「射」指射箭的本領。全句是陳堯咨氣憤時的反詰之語。"},{"level":"adv","topic":"句子翻譯","q":"「以我酌油知之」的意思是？","choices":["用我倒油的杓子就可以量出來","我因為賣油，所以早就聽過你的名聲","憑我倒油的經驗就能明白這個道理","我把油倒給你看，你就知道我很厲害"],"answer":2,"explain":"「以」是「憑、根據」，「酌油」是舀油、倒油，「之」指前面所說「手熟」的道理。賣油翁是要以自身經驗說明道理，而非炫耀自己的技藝勝過陳堯咨。"},{"level":"adv","topic":"文意推求","q":"賣油翁以杓酌油「自錢孔入，而錢不濕」，這段描寫在文中的主要作用是什麼？","choices":["以具體事實印證「惟手熟爾」，使陳堯咨無從反駁","顯示賣油翁的技藝遠遠勝過陳堯咨的射術","說明賣油翁擁有常人所無的天賦異稟","藉此嘲笑陳堯咨連倒油這種小事都不會"],"answer":0,"explain":"賣油翁不作空言，而是當場演示，用眼見為憑的事實證明「手熟」確能達到常人以為神奇的境界。他隨即說「我亦無他，惟手熟爾」，正是要陳堯咨明白道理，並非比較高下或炫技。"},{"level":"adv","topic":"文意推求","q":"賣油翁看陳堯咨射箭「但微頷之」，最能反映他怎樣的態度？","choices":["十分讚賞，認為陳堯咨的箭術當世無雙","認為陳堯咨射術低劣，根本不值一看","因為完全看不懂射箭，只好隨意應付","認可其手法熟練，卻不覺得有什麼了不起"],"answer":3,"explain":"「微頷」是輕微點頭，既非讚歎也非否定：他承認陳堯咨十中八九確實熟練，但在他看來這不過是勤練的結果，算不上稀奇。若真的不值一看，也就不會「久而不去」了。"},{"level":"adv","topic":"文意推求","q":"文末「康肅笑而遣之」的「笑」，最可能表示什麼？","choices":["強顏歡笑，心中其實仍憤恨不平","領悟道理後心服而釋然，自矜之情已消","嘲笑賣油翁不自量力，隨即把他趕走","因為賣油翁技藝高超而放聲大笑"],"answer":1,"explain":"陳堯咨的情緒經歷「自矜→忿然→笑」三個階段。親眼見到酌油瀝錢又聽了「惟手熟爾」之後，他明白自己的箭術同樣只是熟練所致，於是心服氣平，笑著送走老翁，可見其能接受規勸。"},{"level":"adv","topic":"修辭與寫作手法","q":"就寫作手法而言，本文最主要的特色是？","choices":["先發議論再舉史事佐證","通篇議論，層層推理辯駁","藉敘事說理，把道理寄寓在故事中","借景抒情，寓情於景"],"answer":2,"explain":"全文以一則簡短的故事為主體，透過人物對話與酌油的動作，自然帶出「惟手熟爾」的道理，屬於「藉事說理」。作者並未跳出來長篇說教，道理全由故事中的人物之口道出。"},{"level":"adv","topic":"字詞辨析","q":"關於「無他，但手熟爾」與「爾安敢輕吾射」兩句中「爾」字的用法，下列敘述何者正確？","choices":["兩者都是第二人稱代詞「你」","前者是第二人稱「你」；後者是句末語氣詞「罷了」","兩者都是句末語氣詞，相當於「罷了」","前者是句末語氣詞，相當於「罷了」；後者是第二人稱「你」"],"answer":3,"explain":"「但手熟爾」的「爾」通「耳」，是句末語氣詞，表示「罷了、而已」；「爾安敢輕吾射」的「爾」則是第二人稱代詞「你」。同一個字在文中出現兩種用法，是本課字詞辨析的重點。"},{"level":"adv","topic":"文意推求","q":"陳堯咨問賣油翁「汝亦知射乎？吾射不亦精乎？」，這兩句話最能顯示他此時什麼樣的心理？","choices":["虛心求教，想聽聽旁人的意見","自負得意，急於要對方肯定自己的箭術","心生警惕，擔心對方看出自己的破綻","毫不在意，只是隨口與老翁寒暄"],"answer":1,"explain":"兩句都用反問語氣，「汝亦知射乎」隱含輕視老翁不懂射箭之意，「吾射不亦精乎」則是要對方承認自己射得精妙，正呼應開頭的「以此自矜」。若是虛心求教，就不會在聽到「但手熟爾」後隨即「忿然」了。"},{"level":"adv","topic":"比較與延伸","q":"下列文句，何者所表達的道理與本文旨意最為相近？","choices":["盡信書，不如無書","近朱者赤，近墨者黑","不入虎穴，焉得虎子","操千曲而後曉聲，觀千劍而後識器"],"answer":3,"explain":"「操千曲而後曉聲，觀千劍而後識器」出自劉勰《文心雕龍》，意謂彈過上千首曲子才懂得音律，看過上千把劍才能鑑別兵器，強調經驗累積、熟能生巧，與賣油翁「惟手熟爾」之旨相合。其餘三者分別談讀書態度、環境影響與冒險進取，皆不相符。"}];

let level='basic', poolIdx=[], problem=null, answered=false, streak=0, lastIdx=-1;

function buildPool(){ poolIdx = BANK.map((x,i)=>i).filter(i=> level==='mix' || BANK[i].level===level); if(poolIdx.length<2) poolIdx=BANK.map((x,i)=>i); }
/* 每題把選項順序洗牌（避免正解都固定在 A），並重新對映正解索引；原始 BANK 不動 */
function shuffleChoices(p){ const order=p.choices.map((_,k)=>k);
  for(let k=order.length-1;k>0;k--){ const r=Math.floor(Math.random()*(k+1)); const t=order[k]; order[k]=order[r]; order[r]=t; }
  return Object.assign({}, p, { choices: order.map(k=>p.choices[k]), answer: order.indexOf(p.answer) }); }
function nextProblem(){ let i; do{ i=poolIdx[Math.floor(Math.random()*poolIdx.length)]; }while(poolIdx.length>1 && i===lastIdx); lastIdx=i; problem=shuffleChoices(BANK[i]); render(); }
function qText(){ return problem.q; }

function render(){
  answered=false;
  document.getElementById('q').innerHTML=`<span class="tag">${problem.level==='basic'?'基礎':'進階'}</span><div>${problem.q}</div>`;
  const box=document.getElementById('opts'); box.innerHTML='';
  problem.choices.forEach((c,idx)=>{
    const b=document.createElement('button'); b.className='opt'; b.dataset.i=idx;
    b.innerHTML=`<span class="mk">${AB[idx]}</span><span>${c}</span>`;
    b.onclick=()=>choose(idx); box.appendChild(b);
  });
  document.getElementById('explain').className='explain';
  document.getElementById('go').disabled=true;
}

function choose(idx){
  if(answered) return; answered=true;
  const correct = idx===problem.answer;
  const opts=[...document.querySelectorAll('.opt')];
  opts.forEach(o=>o.classList.add('lock'));
  opts[problem.answer].classList.add('ok');
  if(!correct){ opts[idx].classList.add('no'); opts[idx].classList.add('shake'); setTimeout(()=>opts[idx].classList.remove('shake'),400); }

  streak = correct?streak+1:0; document.getElementById('streak').textContent=streak;

  if(window.parent!==window){
    window.parent.postMessage({type:'unit-progress', unitDone:1, unitCorrect:correct?1:0}, '*');
    if(!correct){ window.parent.postMessage({type:'unit-mistake', q:qText(), ans:problem.choices[problem.answer], given:problem.choices[idx], choices:problem.choices, steps:`<div>${problem.explain}</div>`, tip:'知識點：'+(problem.topic||'')}, '*'); }
  }

  document.getElementById('ebody').innerHTML=`<span class="kp">知識點 · ${problem.topic||''}</span><br>正解 <b style="color:var(--right)">${AB[problem.answer]}　${problem.choices[problem.answer]}</b><br>${problem.explain}`;
  document.getElementById('explain').className='explain show';
  document.getElementById('go').disabled=false;
}

document.getElementById('go').onclick=()=>{ if(answered) nextProblem(); };
document.querySelectorAll('.lv').forEach(b=>b.addEventListener('click',()=>{
  document.querySelectorAll('.lv').forEach(x=>x.classList.remove('active'));
  b.classList.add('active'); level=b.dataset.lv; buildPool(); nextProblem();
}));
document.addEventListener('keydown',e=>{ if(e.key==='Enter'&&answered) nextProblem();
  else if(/^[1-5]$/.test(e.key)&&!answered){ const i=+e.key-1; if(i<problem.choices.length) choose(i); } });

(function(){ const lv=new URLSearchParams(location.search).get('level');
  if(lv==='basic'||lv==='adv'||lv==='mix'){ level=lv; document.querySelectorAll('.lv').forEach(b=>b.classList.toggle('active',b.dataset.lv===lv)); }
})();
buildPool(); nextProblem();
</script>
<script>
/* ===== 遊戲指令介面：外層 RPG 可對本題下技能（hint / fifty）。單獨用瀏覽器開啟時不受影響。 ===== */
(function(){
  function box(){var h=document.getElementById('game-hint');if(!h){h=document.createElement('div');h.id='game-hint';h.style.cssText='margin-top:12px;font-size:13px;background:#fff7ed;border:1.5px solid #fed7aa;color:#9a3412;border-radius:10px;padding:9px 12px;line-height:1.6';var o=document.getElementById('opts');if(o&&o.parentNode){o.parentNode.insertBefore(h,o.nextSibling);}else{(document.querySelector('.card')||document.body).appendChild(h);}}return h;}
  function showHint(){if(answered||!problem)return;box().innerHTML='💡 提示 · 這題的知識點：'+(problem.topic||'');}
  function eliminateOne(){if(answered||!problem)return;var opts=[].slice.call(document.querySelectorAll('.opt')).filter(function(o){return !o.classList.contains('gone')&&(+o.dataset.i)!==problem.answer;});if(!opts.length)return;var p=opts[Math.floor(Math.random()*opts.length)];p.classList.add('gone');p.disabled=true;p.style.opacity='.35';p.style.textDecoration='line-through';p.style.pointerEvents='none';}
  if(typeof nextProblem==='function'){var _n=nextProblem;nextProblem=function(){var h=document.getElementById('game-hint');if(h)h.remove();return _n.apply(this,arguments);};}
  window.addEventListener('message',function(e){var d=e.data;if(!d||d.type!=='unit-command')return;if(d.cmd==='hint')showHint();if(d.cmd==='fifty')eliminateOne();});
  if(window.parent!==window){window.parent.postMessage({type:'unit-ready',supports:['hint','fifty']},'*');}
})();
</script>
<script>
/* ===== exam-mode-hook：綜合測驗模式，?exam=1 時交由外層 runner 控制 ===== */
(function(){
  if(new URLSearchParams(location.search).get('exam')!=='1') return;
  document.documentElement.setAttribute('data-exam','1');
  var lv=document.querySelector('.levels'); if(lv) lv.style.display='none';
  var go=document.getElementById('go'); if(!go) return;
  function upd(){ var isNext=go.classList.contains('next')||(go.textContent||'').indexOf('下一題')>=0;
    go.style.display=isNext?'none':''; }
  upd();
  try{ new MutationObserver(upd).observe(go,{attributes:true,childList:true,characterData:true,subtree:true}); }catch(e){}
})();
</script>
