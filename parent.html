<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>家長後台 · 學習聯絡簿</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@500;600;700&family=Noto+Sans+TC:wght@400;500;700&family=Noto+Serif+TC:wght@700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root{--paper:#f4f2ea;--card:#fffdf8;--ink:#2b2b28;--muted:#8a857b;--line:#e5e2d8;--seal:#c1352b;--blue:#2563eb;--orange:#ea580c;--ok:#3f7d4e;}
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;height:100%;}
  body{font-family:'Noto Sans TC',system-ui,-apple-system,sans-serif;color:var(--ink);
    background:linear-gradient(var(--line) 1px,transparent 1px) 0 0/26px 26px,linear-gradient(90deg,var(--line) 1px,transparent 1px) 0 0/26px 26px,var(--paper);}
  .num{font-family:'Lexend',sans-serif;font-variant-numeric:tabular-nums;}
  button{font-family:inherit;cursor:pointer;border:none;} a{color:inherit;text-decoration:none;} input,select{font-family:inherit;}
  .hidden{display:none!important;}
  .app{max-width:520px;margin:0 auto;min-height:100vh;padding:0 16px 40px;}
  .top{display:flex;align-items:center;justify-content:space-between;padding:20px 2px 14px;}
  .brand{display:flex;align-items:center;gap:10px;}
  .seal{width:36px;height:36px;border:2px solid var(--seal);border-radius:8px;color:var(--seal);font-family:'Noto Serif TC',serif;font-weight:700;font-size:16px;display:flex;align-items:center;justify-content:center;transform:rotate(-6deg);}
  .brand h1{margin:0;font-family:'Noto Serif TC',serif;font-size:20px;letter-spacing:1px;}
  .brand small{display:block;color:var(--muted);font-size:11px;font-weight:400;margin-top:2px;letter-spacing:0;}
  .links{display:flex;gap:7px;}
  .chip{font-size:12px;background:#eceadf;border-radius:99px;padding:6px 11px;color:var(--ink);}
  .chip.blue{background:#eaf1fb;color:var(--blue);}
  .card{background:var(--card);border:1.5px solid var(--line);border-radius:18px;padding:18px;margin-bottom:14px;box-shadow:0 6px 20px -16px rgba(60,50,20,.4);}
  .sec{font-size:13px;color:var(--muted);letter-spacing:2px;margin:6px 2px 12px;font-weight:500;}
  .hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
  .hdr h2{margin:0;font-size:16px;} .streak{font-size:12px;color:var(--seal);background:#fbeeec;border:1px solid #f0d5d1;border-radius:99px;padding:5px 11px;}
  .streak b{font-family:'Lexend';font-weight:700;}
  .big{font-family:'Lexend';font-size:30px;font-weight:700;} .big small{font-size:14px;color:var(--muted);font-weight:400;}
  .task{display:flex;align-items:center;gap:12px;padding:11px 0;border-bottom:1px solid var(--line);} .task:last-child{border-bottom:none;}
  .task .nm{flex:1;min-width:0;} .task .nm .t{font-weight:500;font-size:15px;} .task .nm .s{font-size:12px;color:var(--muted);margin-top:2px;}
  .task .st{font-size:13px;font-weight:600;white-space:nowrap;} .task .st.ok{color:var(--ok);} .task .st.no{color:var(--muted);}
  .week{display:flex;gap:6px;justify-content:space-between;margin-top:4px;}
  .day{flex:1;text-align:center;} .day .dot{width:22px;height:22px;border-radius:8px;margin:4px auto 0;background:#eceadf;}
  .day .dot.full{background:var(--ok);} .day .dot.part{background:var(--orange);} .day .lb{font-size:10px;color:var(--muted);}
  .mrow{display:flex;gap:20px;} .mrow>div{flex:1;} .mrow .k{font-size:12px;color:var(--muted);}
  .subj{margin-bottom:12px;border:1.5px solid var(--line);border-radius:16px;overflow:hidden;background:var(--card);}
  .subj-h{display:flex;align-items:center;gap:12px;padding:13px 15px;cursor:pointer;}
  .subj-h .ic{width:38px;height:38px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:19px;flex:none;}
  .subj-h .nm{flex:1;font-family:'Noto Serif TC',serif;font-weight:700;font-size:16px;letter-spacing:1px;}
  .subj-h .cnt{font-size:12px;color:var(--muted);} .subj-h .cv{font-size:12px;color:var(--muted);}
  .subj-b{padding:2px 15px 8px;border-top:1px dashed var(--line);}
  .term-h{font-size:13px;font-weight:700;color:var(--seal);margin:14px 0 4px;letter-spacing:1px;}
  .chap{font-size:12px;font-weight:600;color:var(--muted);margin:8px 0 4px;padding:5px 10px;background:#faf8f1;border-radius:8px;}
  /* 大章樹（照出版社目次：大章可整章勾、展開選小節） */
  .chapblk{border:1px solid var(--line);border-radius:12px;margin:9px 0;overflow:hidden;background:#fff;}
  .chaprow{display:flex;align-items:center;gap:11px;padding:12px;}
  .cbox{width:23px;height:23px;border-radius:6px;border:2px solid #cbc8bd;flex:none;cursor:pointer;background:#fff;position:relative;}
  .cbox.all{border-color:var(--ok);background:var(--ok);}
  .cbox.all::after{content:"✓";color:#fff;font-size:14px;font-weight:700;position:absolute;top:50%;left:50%;transform:translate(-50%,-55%);}
  .cbox.some{border-color:var(--orange);background:var(--orange);}
  .cbox.some::after{content:"−";color:#fff;font-size:16px;font-weight:700;position:absolute;top:50%;left:50%;transform:translate(-50%,-58%);}
  .cbox.dis{opacity:.4;cursor:default;}
  .cname{flex:1;font-weight:600;font-size:14.5px;cursor:pointer;min-width:0;}
  .ccnt{font-size:12px;color:var(--muted);cursor:pointer;display:flex;align-items:center;gap:7px;white-space:nowrap;}
  .caret{font-size:11px;color:var(--muted);width:12px;text-align:center;}
  .chapunits{padding:0 12px 4px;border-top:1px dashed var(--line);background:#fdfcf8;}
  .verrow{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px dashed var(--line);}
  .verrow .l{font-size:12px;color:var(--muted);} .verrow select{flex:1;padding:8px 10px;border:1.5px solid var(--line);border-radius:9px;background:#fff;font-size:13px;}
  .unit{padding:11px 0;border-bottom:1px solid var(--line);} .unit:last-child{border-bottom:none;}
  .unit-h{display:flex;align-items:center;gap:11px;} .unit .info{flex:1;min-width:0;} .unit .info .t{font-weight:500;font-size:14px;} .unit .info .s{font-size:11px;color:var(--muted);margin-top:2px;}
  .toggle{width:46px;height:27px;border-radius:99px;background:#d8d5c9;position:relative;transition:.2s;flex:none;} .toggle.on{background:var(--ok);}
  .toggle i{position:absolute;top:3px;left:3px;width:21px;height:21px;border-radius:99px;background:#fff;transition:.2s;} .toggle.on i{left:22px;}
  .cfg{margin-top:10px;padding:10px;background:#faf8f1;border-radius:10px;display:flex;align-items:center;gap:10px;justify-content:space-between;flex-wrap:wrap;}
  .cfg .l{font-size:12px;color:var(--muted);} .goal{width:58px;padding:7px;border:1.5px solid var(--line);border-radius:8px;text-align:center;font-family:'Lexend';font-size:14px;}
  .seg{display:flex;background:#eceadf;border-radius:8px;padding:2px;} .seg button{background:none;padding:6px 10px;font-size:12px;color:var(--muted);border-radius:6px;} .seg button.on{background:#fff;color:var(--ink);font-weight:500;}
  .save-hint{font-size:12px;color:var(--ok);text-align:center;height:16px;margin-top:4px;}
  /* login */
  .auth{max-width:380px;margin:0 auto;padding:70px 20px;} .auth .seal{width:56px;height:56px;font-size:26px;margin:0 auto 14px;}
  .auth h1{text-align:center;font-family:'Noto Serif TC',serif;font-size:22px;} .auth p{text-align:center;color:var(--muted);font-size:13px;margin:6px 0 24px;}
  .field{margin-bottom:12px;} .field label{display:block;font-size:13px;color:var(--muted);margin-bottom:6px;}
  .field input{width:100%;padding:13px;border:1.5px solid var(--line);border-radius:12px;font-size:16px;background:#fff;}
  .primary{width:100%;background:var(--ink);color:#fff;padding:14px;border-radius:13px;font-size:16px;font-weight:600;}
  .msg{font-size:13px;text-align:center;min-height:18px;margin:10px 0;} .msg.err{color:var(--seal);} .msg.ok{color:var(--ok);}
</style>
</head>
<body>

<div id="view-auth" class="auth hidden">
  <div class="seal">學</div><h1>家長後台</h1><p>用跟聯絡簿一樣的帳號登入,看進度、開放課程</p>
  <div class="msg" id="authMsg"></div>
  <div class="field"><label>帳號(電子郵件)</label><input id="email" type="email" autocomplete="username"></div>
  <div class="field"><label>密碼</label><input id="pass" type="password" autocomplete="current-password"></div>
  <button class="primary" id="loginBtn">登入</button>
</div>

<div id="view-main" class="app hidden">
  <div class="top">
    <div class="brand"><div class="seal">學</div><div><h1>家長後台<small id="whoLine"></small></h1></div></div>
    <div class="links"><a class="chip blue" href="index.html">📖 聯絡簿</a><a class="chip" href="game.html">⚔ 遊戲</a><button class="chip" id="logout">登出</button></div>
  </div>

  <div class="card">
    <div class="hdr"><h2>今日總覽</h2><span class="streak hidden" id="streakChip"></span></div>
    <div class="big"><span id="todayMet">0</span><small> / <span id="todayTotal">0</span> 項任務達標</small></div>
    <div id="taskList" style="margin-top:6px;"></div>
  </div>

  <div class="card">
    <div class="hdr"><h2>最近 7 天</h2></div>
    <div class="week" id="week"></div>
    <div class="mrow" style="margin-top:16px;">
      <div><div class="k">錯題本</div><div class="big" id="mkTotal">0<small> 題</small></div></div>
      <div><div class="k">今日待複習</div><div class="big" id="mkDue">0<small> 題</small></div></div>
    </div>
  </div>

  <div class="sec">開放課程 · 打開孩子可以練/可以打的單元,設每日題數</div>
  <div id="subjList"></div>
  <div class="save-hint" id="saveHint"></div>

  <div class="sec">基本設定</div>
  <div class="card">
    <div class="field"><label>孩子的顯示名稱</label><input id="pName" type="text" placeholder="孩子的名字"></div>
    <div class="field"><label>完成獎勵訊息（當天全部達標時，孩子端會跳出）</label><input id="pReward" type="text" placeholder="例如：今天全部完成，可以看 30 分鐘卡通！"></div>
    <button class="primary" id="pSaveBasic">儲存</button>
    <div class="save-hint" id="basicHint"></div>
  </div>

  <div class="sec">休息日 · 這幾天不排任務,也不會中斷連續紀錄</div>
  <div class="card"><div id="restDays" style="display:flex;gap:8px"></div></div>

  <div class="sec">段考複習組 · 框好段考範圍,孩子端就能考一次綜合測驗</div>
  <div class="card" id="examCard"></div>

  <div class="sec">班級排行榜 · 讓孩子和同班同學比學習進度(預設不公開)</div>
  <div class="card">
    <div class="field"><label>綽號(會顯示在排行榜上,請用綽號、<b style="color:var(--seal)">不要用真名</b>)</label><input id="bNick" type="text" placeholder="例如:小老虎"></div>
    <div class="field"><label>班級碼(老師/家長給的一組碼,只有同碼的同學會互相看到)</label><input id="bCode" type="text" placeholder="例如:tiger7A"></div>
    <div class="cfg" style="justify-content:space-between;margin-top:0">
      <span class="l" style="font-size:13px;color:var(--ink)">加入班級排行(關閉＝完全不公開)</span>
      <div class="toggle" id="bToggle" onclick="toggleOptIn()"><i></i></div>
    </div>
    <button class="primary" style="margin-top:12px" id="bSave">儲存</button>
    <div class="save-hint" id="boardHint"></div>
  </div>

  <div class="sec">帳號</div>
  <div class="card">
    <div class="field"><label>修改登入密碼</label><input id="pNewPw" type="password" autocomplete="new-password" placeholder="新密碼（至少 6 個字）"></div>
    <button class="primary" id="pSavePw">更新密碼</button>
    <div class="save-hint" id="pwHint"></div>
  </div>
</div>

<script>
const $=id=>document.getElementById(id);
const SUPABASE_URL="https://xmkenwcqxbjeqyzigdoj.supabase.co";
const SUPABASE_ANON="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inhta2Vud2NxeGJqZXF5emlnZG9qIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMyODYxMjEsImV4cCI6MjA5ODg2MjEyMX0.2Imp7H39wt5m4tZ4V3W0y0lyPqYu61a2liWnlytZzLc";
const sb=window.supabase?supabase.createClient(SUPABASE_URL,SUPABASE_ANON):null;
const WD=["日","一","二","三","四","五","六"];
const fmt=d=>d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");
const todayStr=()=>fmt(new Date());

let UNITS=[],COURSES=[],SUBJECTS=[],collapsed={},chapExpanded={};
let settings={display_name:"",course_id:"",course_by_subject:{},reward_msg:"",selected_units:[],daily_goals:{},rest_days:[],parent_pin:null,exam_groups:[]};
let egEdit=null;
let board={nickname:"",group_code:"",opted_in:false};
let user=null;

const unit=id=>UNITS.find(u=>u.id===id)||{title:id};
const subjMeta=s=>SUBJECTS.find(x=>x.id===s)||{id:s,icon:"📚",color:"#8a857b"};
const coursesFor=s=>COURSES.filter(c=>c.subject===s);
const cfg=uid=>{let g=settings.daily_goals[uid];if(g==null)return{target:10,mode:"attempts",level:"mix"};if(typeof g==="number")return{target:g,mode:"attempts",level:"mix"};return{target:g.target||10,mode:g.mode||"attempts",level:g.level||"mix"};};
const enabled=()=>settings.selected_units.filter(u=>settings.daily_goals[u]!=null);

async function boot(){
  if(!sb){ $("view-auth").classList.remove("hidden"); $("authMsg").className="msg err"; $("authMsg").textContent="Supabase 未載入"; return; }
  try{ const j=await(await fetch("units.json",{cache:"no-store"})).json(); UNITS=j.units||[];COURSES=j.courses||[];SUBJECTS=j.subjects||[]; }catch(e){}
  const {data:{session}}=await sb.auth.getSession();
  if(session){ user=session.user; enter(); } else showAuth();
  sb.auth.onAuthStateChange((_e,s)=>{ if(s&&!user){ user=s.user; enter(); } if(!s){ user=null; showAuth(); } });
}
function showAuth(){ $("view-auth").classList.remove("hidden"); $("view-main").classList.add("hidden"); }
$("loginBtn").onclick=async()=>{ const email=$("email").value.trim(),pass=$("pass").value,m=$("authMsg");
  if(!email||!pass){m.className="msg err";m.textContent="請輸入帳號密碼";return;} m.className="msg";m.textContent="登入中…";
  const {error}=await sb.auth.signInWithPassword({email,password:pass});
  if(error){m.className="msg err";m.textContent=/Invalid login/.test(error.message)?"帳號或密碼不對":error.message;} };
$("logout").onclick=async()=>{ await sb.auth.signOut(); };

async function enter(){
  $("view-auth").classList.add("hidden"); $("view-main").classList.remove("hidden");
  $("whoLine").textContent=user.email;
  await loadSettings(); await loadOverview(); renderSubjects(); renderBasic(); renderRest(); renderExam();
  await loadBoard(); renderBoard();
}
function renderBasic(){ $("pName").value=settings.display_name||""; $("pReward").value=settings.reward_msg||""; }
$("pSaveBasic").onclick=async()=>{ settings.display_name=$("pName").value.trim(); settings.reward_msg=$("pReward").value.trim();
  await saveSettings(); const h=$("basicHint"); h.style.color="var(--ok)"; h.textContent="已儲存 ✓"; setTimeout(()=>h.textContent="",1200); };
function renderRest(){ $("restDays").innerHTML=WD.map((w,i)=>{ const on=(settings.rest_days||[]).includes(i);
  return `<button onclick="toggleRest(${i})" style="flex:1;padding:10px 0;border-radius:9px;border:1.5px solid ${on?'var(--seal)':'var(--line)'};background:${on?'#fbeeec':'#fff'};color:${on?'var(--seal)':'var(--muted)'};font-weight:${on?'600':'400'}">${w}</button>`; }).join(""); }
window.toggleRest=async i=>{ const a=settings.rest_days||[]; const p=a.indexOf(i); if(p>=0)a.splice(p,1); else a.push(i); settings.rest_days=a; renderRest(); await saveSettings(); };
$("pSavePw").onclick=async()=>{ const pw=$("pNewPw").value, h=$("pwHint");
  if(!pw||pw.length<6){ h.style.color="var(--seal)"; h.textContent="密碼至少 6 個字"; return; }
  const {error}=await sb.auth.updateUser({password:pw});
  if(error){ h.style.color="var(--seal)"; h.textContent=error.message; }
  else { $("pNewPw").value=""; h.style.color="var(--ok)"; h.textContent="密碼已更新 ✓"; setTimeout(()=>h.textContent="",1500); } };

/* 班級排行榜 · 只寫自己那列的 nickname/group_code/opted_in（等級等數值由遊戲端寫，不在這動）*/
async function loadBoard(){
  try{ const {data,error}=await sb.from("public_profile").select("nickname,group_code,opted_in").eq("user_id",user.id).maybeSingle();
    if(error) throw error;
    if(data) board={nickname:data.nickname||"",group_code:data.group_code||"",opted_in:!!data.opted_in};
  }catch(e){ /* 表還沒建：欄位留空，存檔時再提示 */ }
}
function renderBoard(){ $("bNick").value=board.nickname||""; $("bCode").value=board.group_code||""; $("bToggle").classList.toggle("on",!!board.opted_in); }
window.toggleOptIn=()=>{
  if(!board.opted_in && !confirm("開啟後,孩子的綽號與學習數值會顯示給『同一個班級碼』的同學看。確定要公開嗎?")) return;
  board.opted_in=!board.opted_in; $("bToggle").classList.toggle("on",board.opted_in);
};
$("bSave").onclick=async()=>{
  board.nickname=$("bNick").value.trim(); board.group_code=$("bCode").value.trim();
  const h=$("boardHint");
  if(board.opted_in && !board.group_code){ h.style.color="var(--seal)"; h.textContent="要加入排行榜,請先填班級碼"; return; }
  if(board.opted_in && !board.nickname){ h.style.color="var(--seal)"; h.textContent="要加入排行榜,請先填綽號"; return; }
  h.style.color="var(--muted)"; h.textContent="儲存中…";
  const {error}=await sb.from("public_profile").upsert({user_id:user.id,nickname:board.nickname,group_code:board.group_code,opted_in:board.opted_in,updated_at:new Date().toISOString()},{onConflict:"user_id"});
  if(error){ h.style.color="var(--seal)"; h.textContent=/public_profile|does not exist|schema cache|relation|find the table/.test(error.message||"")?"排行榜還沒在資料庫開啟(請先跑 sql/public-profile.sql)":("存檔失敗:"+error.message); }
  else { h.style.color="var(--ok)"; h.textContent="已儲存 ✓"; setTimeout(()=>h.textContent="",1500); }
};

/* 段考複習組 */
function examUnitsOf(g){ return (g.unit_ids||[]).filter(id=>{ const u=UNITS.find(x=>x.id===id); return u&&u.ready; }); }
function renderExam(){ const card=$("examCard"); const groups=settings.exam_groups||[], opened=(settings.selected_units||[]).map(id=>unit(id)).filter(u=>u&&u.ready);
  if(opened.length===0){ card.innerHTML=`<div style="color:var(--muted);font-size:13px">先在上面「開放課程」打開單元,才能框段考範圍。</div>`; return; }
  let html="";
  if(groups.length) html+=groups.map(g=>{ const cnt=examUnitsOf(g).length, off=g.active===false;
    return `<div class="task"><div class="nm"><div class="t">${g.name||'未命名'}${off?' <span style="color:var(--muted);font-size:12px">(已停用)</span>':''}</div><div class="s">${cnt} 個單元${g.subject?' · '+g.subject:''}</div></div>
      <div style="display:flex;gap:6px"><button class="chip" onclick="egOpen('${g.id}')">編輯</button><button class="chip" onclick="egToggle('${g.id}')">${off?'啟用':'停用'}</button><button class="chip" style="color:var(--seal)" onclick="egDel('${g.id}')">刪</button></div></div>`; }).join("");
  else html+=`<div style="color:var(--muted);font-size:13px;margin-bottom:8px">還沒有複習組。</div>`;
  html+=`<button class="primary" style="margin-top:10px" onclick="egOpen()">＋ 新增一組</button><div id="egForm"></div>`;
  card.innerHTML=html;
}
window.egCancel=()=>{ egEdit=null; const f=$("egForm"); if(f) f.innerHTML=""; };
window.egOpen=id=>{ const g=id?(settings.exam_groups||[]).find(x=>x.id===id):null;
  egEdit={ id:g?g.id:('g'+Date.now()), name:g?g.name:'', units:new Set(g?(g.unit_ids||[]):[]) };
  const opened=(settings.selected_units||[]).map(x=>unit(x)).filter(u=>u&&u.ready), bySub={}; opened.forEach(u=>{(bySub[u.subject]=bySub[u.subject]||[]).push(u);});
  let chips=""; Object.keys(bySub).forEach(s=>{ chips+=`<div style="font-size:12px;color:var(--muted);margin:10px 0 4px">${s}</div><div style="display:flex;flex-wrap:wrap;gap:7px">`+
    bySub[s].map(u=>`<button class="chip" onclick="egPick('${u.id}',this)" style="${egEdit.units.has(u.id)?'background:#fbeeec;color:var(--seal)':''}">${u.title}</button>`).join("")+`</div>`; });
  $("egForm").innerHTML=`<div class="card" style="margin-top:10px;background:#faf8f1">
    <div class="field"><label>名稱</label><input id="egName" type="text" value="${(egEdit.name||'').replace(/"/g,'&quot;')}" placeholder="例如：第二次段考複習"></div>
    ${chips}
    <button class="primary" style="margin-top:12px" onclick="egSave()">儲存</button>
    <button class="chip" style="width:100%;margin-top:8px;text-align:center" onclick="egCancel()">取消</button></div>`;
};
window.egPick=(id,el)=>{ if(egEdit.units.has(id)){ egEdit.units.delete(id); el.style.background=''; el.style.color=''; } else { egEdit.units.add(id); el.style.background='#fbeeec'; el.style.color='var(--seal)'; } };
window.egSave=async()=>{ const name=($("egName").value||'').trim()||'段考複習組', ids=[...egEdit.units]; if(!ids.length){ alert('請至少選一個單元'); return; }
  const subs={}; ids.forEach(id=>{const u=unit(id); if(u&&u.subject)subs[u.subject]=(subs[u.subject]||0)+1;}); const subject=Object.keys(subs).sort((a,b)=>subs[b]-subs[a])[0]||"";
  const groups=settings.exam_groups||[], ex=groups.find(g=>g.id===egEdit.id), obj={id:egEdit.id,name,unit_ids:ids,subject,active:ex?ex.active!==false:true};
  if(ex)Object.assign(ex,obj); else groups.push(obj); settings.exam_groups=groups; egEdit=null; renderExam(); await saveSettings(); };
window.egDel=async id=>{ if(!confirm('確定刪除這個複習組？'))return; settings.exam_groups=(settings.exam_groups||[]).filter(g=>g.id!==id); renderExam(); await saveSettings(); };
window.egToggle=async id=>{ const g=(settings.exam_groups||[]).find(x=>x.id===id); if(!g)return; g.active=(g.active===false); renderExam(); await saveSettings(); };
async function loadSettings(){
  const {data}=await sb.from("settings").select("*").eq("user_id",user.id).maybeSingle();
  if(data) settings={display_name:data.display_name||"",course_id:data.course_id||"",course_by_subject:data.course_by_subject||{},reward_msg:data.reward_msg||"",selected_units:data.selected_units||[],daily_goals:data.daily_goals||{},rest_days:data.rest_days||[],parent_pin:data.parent_pin||null,exam_groups:data.exam_groups||[]};
}
async function saveSettings(){
  const base={user_id:user.id,display_name:settings.display_name,course_id:settings.course_id,course_by_subject:settings.course_by_subject,reward_msg:settings.reward_msg,selected_units:settings.selected_units,daily_goals:settings.daily_goals,rest_days:settings.rest_days,parent_pin:settings.parent_pin,updated_at:new Date().toISOString()};
  let {error}=await sb.from("settings").upsert({...base,exam_groups:settings.exam_groups||[]},{onConflict:"user_id"});
  if(error && /exam_groups/.test(error.message||"")){ ({error}=await sb.from("settings").upsert(base,{onConflict:"user_id"})); }
  const h=$("saveHint"); if(error){h.style.color="var(--seal)";h.textContent="存檔失敗:"+error.message;} else {h.style.color="var(--ok)";h.textContent="已儲存 ✓";setTimeout(()=>h.textContent="",1200);}
}

/* 今日 + 7 天 + 錯題 */
async function loadOverview(){
  const from=new Date(); from.setDate(from.getDate()-6);
  const {data:act}=await sb.from("activity").select("*").gte("day",fmt(from));
  const byDay={}; (act||[]).forEach(r=>{(byDay[r.day]=byDay[r.day]||{})[r.unit_id]={done:r.done,correct:r.correct};});
  const today=byDay[todayStr()]||{}, en=enabled();
  // 今日任務
  let met=0; $("taskList").innerHTML = en.length? en.map(uid=>{ const c=cfg(uid),a=today[uid]||{},v=c.mode==="correct"?(a.correct||0):(a.done||0),ok=v>=c.target; if(ok)met++;
    return `<div class="task"><div class="nm"><div class="t">${unit(uid).title}</div><div class="s">${unit(uid).subject||""} · 目標 ${c.mode==="correct"?"答對":"做"} ${c.target} 題</div></div>
      <div class="st ${ok?'ok':'no'}">${ok?'✓ 達標':(v>0?`還差 ${c.target-v} 題`:'未開始')}</div></div>`; }).join("")
    : `<div class="task"><div class="nm s">還沒開放任何單元,往下打開幾個吧。</div></div>`;
  $("todayMet").textContent=met; $("todayTotal").textContent=en.length;
  // 7 天
  $("week").innerHTML=[...Array(7)].map((_,i)=>{ const d=new Date();d.setDate(d.getDate()-(6-i));const ds=fmt(d),am=byDay[ds]||{};
    let m=0,has=Object.keys(am).length>0; en.forEach(uid=>{const c=cfg(uid),a=am[uid],v=c.mode==="correct"?(a?.correct||0):(a?.done||0);if(a&&v>=c.target)m++;});
    const full=en.length&&m===en.length,part=!full&&(m>0||has);
    return `<div class="day"><div class="lb">${WD[d.getDay()]}</div><div class="dot ${full?'full':part?'part':''}"></div></div>`; }).join("");
  // streak
  let streak=0,d=new Date(); for(let i=0;i<60;i++){const ds=fmt(d),am=byDay[ds]; if(!am){if(ds===todayStr()){d.setDate(d.getDate()-1);continue;}break;} let m=0;en.forEach(uid=>{const c=cfg(uid),a=am[uid],v=c.mode==="correct"?(a?.correct||0):(a?.done||0);if(a&&v>=c.target)m++;}); const full=en.length&&m===en.length; if(full){streak++;d.setDate(d.getDate()-1);}else if(ds===todayStr()){d.setDate(d.getDate()-1);}else break; }
  const chip=$("streakChip"); if(streak>0){chip.classList.remove("hidden");chip.innerHTML=`🔥 連續達標 <b>${streak}</b> 天`;}else chip.classList.add("hidden");
  // 錯題
  const {data:mk}=await sb.from("mistakes").select("due"); $("mkTotal").innerHTML=(mk?mk.length:0)+"<small> 題</small>";
  const due=(mk||[]).filter(r=>!r.due||r.due<=todayStr()).length; $("mkDue").innerHTML=due+"<small> 題</small>";
}

/* 開放課程控制 */
function chNum(ch){ const m=(ch||"").match(/第(\d+)/); return m?+m[1]:99; }
function chaptersFor(list){
  const key=u=>(u.term==="下"?1:0)*100 + chNum(u.ch);
  const sorted=list.slice().sort((a,b)=>key(a)-key(b));
  let html="", lastTerm=null, lastCh=null;
  sorted.forEach(u=>{
    if(u.term!==lastTerm){ html+=`<div class="term-h">國一${u.term||"上"}</div>`; lastTerm=u.term; lastCh=null; }
    if((u.ch||"")!==lastCh){ html+=`<div class="chap">${u.ch||"其他"}</div>`; lastCh=u.ch||""; }
    html+=unitRow(u);
  });
  return html;
}
/* 大章樹：依所選版本(出版社)顯示該家 chapters；沒選版本用第一個有章節的版本；沒章節的科目回退舊分組 */
function courseForSubject(sid){
  const courses=coursesFor(sid), cur=(settings.course_by_subject||{})[sid]||"";
  let c = cur ? courses.find(x=>x.id===cur) : null;
  if(!c) c = courses.find(x=>Array.isArray(x.chapters)&&x.chapters.length);
  return c||null;
}
function chaptersForSubject(sid){ const c=courseForSubject(sid); return (c&&Array.isArray(c.chapters)&&c.chapters.length)?c.chapters:null; }
function readyIds(ch){ return (ch.units||[]).filter(id=>{const u=unit(id);return u&&u.ready;}); }
function chapObjs(ch){ return (ch.units||[]).map(id=>unit(id)).filter(u=>u&&UNITS.some(x=>x.id===u.id)); }
function pendRow(u){ return `<div class="unit" style="opacity:.5"><div class="unit-h"><div class="toggle" style="background:#d8d5c9;cursor:not-allowed"><i></i></div><div class="info"><div class="t">${u.title}${u.author?`（${u.author}）`:''}</div><div class="s">${u.tag||''} · 內容準備中</div></div></div></div>`; }
function chapterTreeHTML(sid,chapters){
  let html="",lastTerm=null;
  chapters.forEach((ch,idx)=>{
    const objs=chapObjs(ch); if(!objs.length) return;
    const rids=objs.filter(u=>u.ready!==false).map(u=>u.id);
    if(ch.term!==lastTerm){ html+=`<div class="term-h">國一${ch.term||"上"}</div>`; lastTerm=ch.term; }
    const onCnt=rids.filter(id=>settings.selected_units.includes(id)).length, total=rids.length, pend=objs.length-total;
    const state=total&&onCnt===total?"all":(onCnt>0?"some":"none");
    const exp=!!chapExpanded[sid+"|"+idx];
    html+=`<div class="chapblk"><div class="chaprow">
      <div class="cbox ${state} ${total?'':'dis'}" ${total?`onclick="toggleChap('${sid}',${idx})"`:''}></div>
      <div class="cname" onclick="toggleChapExpand('${sid}',${idx})">${ch.ch}</div>
      <div class="ccnt" onclick="toggleChapExpand('${sid}',${idx})">${onCnt}/${total}${pend?` ·${pend}準備中`:''}<span class="caret">${exp?'▾':'▸'}</span></div>
      </div>${exp?`<div class="chapunits">${objs.map(u=>u.ready!==false?unitRow(u):pendRow(u)).join("")}</div>`:""}</div>`;
  });
  return html;
}
window.toggleChapExpand=(sid,idx)=>{ const k=sid+"|"+idx; chapExpanded[k]=!chapExpanded[k]; renderSubjects(); };
window.toggleChap=async(sid,idx)=>{
  const chs=chaptersForSubject(sid); if(!chs||!chs[idx])return;
  const ids=readyIds(chs[idx]); if(!ids.length)return;
  const allOn=ids.every(id=>settings.selected_units.includes(id));
  if(allOn){ ids.forEach(id=>{ const i=settings.selected_units.indexOf(id); if(i>=0)settings.selected_units.splice(i,1); delete settings.daily_goals[id]; }); }
  else { ids.forEach(id=>{ if(!settings.selected_units.includes(id))settings.selected_units.push(id); if(settings.daily_goals[id]==null)settings.daily_goals[id]={target:10,mode:"attempts",level:"mix"}; }); chapExpanded[sid+"|"+idx]=true; }
  renderSubjects(); renderExam(); await saveSettings(); await loadOverview();
};
function renderSubjects(){
  const subs=SUBJECTS.filter(s=>UNITS.some(u=>u.subject===s.id&&u.ready)).map(s=>s.id);
  $("subjList").innerHTML=subs.map(sid=>{ const m=subjMeta(sid),open=!collapsed[sid];
    const list=UNITS.filter(u=>u.subject===sid&&u.ready);
    const onCnt=list.filter(u=>settings.selected_units.includes(u.id)).length;
    const courses=coursesFor(sid),cur=(settings.course_by_subject||{})[sid]||"";
    const ver=courses.length?`<div class="verrow"><span class="l">版本</span><select onchange="setVer('${sid}',this.value)"><option value="">預設</option>${courses.map(c=>`<option value="${c.id}" ${c.id===cur?"selected":""}>${c.title}</option>`).join("")}</select></div>`:"";
    const chapters=chaptersForSubject(sid);
    return `<div class="subj">
      <div class="subj-h" onclick="toggleSubj('${sid}')"><div class="ic" style="background:${m.color}1a;color:${m.color}">${m.icon}</div>
        <div class="nm">${sid}</div><div class="cnt">${onCnt}/${list.length} 開放</div></div>
      ${open?`<div class="subj-b">${ver}${chapters?chapterTreeHTML(sid,chapters):chaptersFor(list)}</div>`:""}</div>`; }).join("");
}
function unitRow(u){ const on=settings.selected_units.includes(u.id),c=cfg(u.id);
  return `<div class="unit"><div class="unit-h"><div class="toggle ${on?'on':''}" onclick="toggleUnit('${u.id}')"><i></i></div>
    <div class="info"><div class="t">${u.title}${u.author?`（${u.author}）`:''}</div><div class="s">${u.tag||u.subject||""}</div></div></div>
    ${on?`<div class="cfg"><span class="l">每日題數</span><input class="goal" type="number" min="1" value="${c.target}" onchange="setGoal('${u.id}',this.value)">
      <div class="seg"><button class="${c.level==='basic'?'on':''}" onclick="setLevel('${u.id}','basic')">基礎</button><button class="${c.level==='adv'?'on':''}" onclick="setLevel('${u.id}','adv')">進階</button><button class="${c.level==='mix'?'on':''}" onclick="setLevel('${u.id}','mix')">混合</button></div></div>`:""}</div>`;
}
window.toggleSubj=s=>{collapsed[s]=!collapsed[s];renderSubjects();};
window.toggleUnit=async uid=>{ const i=settings.selected_units.indexOf(uid);
  if(i>=0){settings.selected_units.splice(i,1);delete settings.daily_goals[uid];}
  else{settings.selected_units.push(uid);if(settings.daily_goals[uid]==null)settings.daily_goals[uid]={target:10,mode:"attempts",level:"mix"};}
  renderSubjects(); renderExam(); await saveSettings(); await loadOverview(); };
function writeCfg(uid,p){settings.daily_goals[uid]={...cfg(uid),...p};}
window.setGoal=async(uid,v)=>{writeCfg(uid,{target:Math.max(1,parseInt(v)||1)});await saveSettings();await loadOverview();};
window.setLevel=async(uid,l)=>{writeCfg(uid,{level:l});renderSubjects();await saveSettings();};
window.setVer=async(s,c)=>{settings.course_by_subject=settings.course_by_subject||{};if(c)settings.course_by_subject[s]=c;else delete settings.course_by_subject[s];chapExpanded={};renderSubjects();await saveSettings();};

boot();
</script>
