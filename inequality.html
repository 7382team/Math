<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>一元一次不等式 練習</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@400;500;600;700&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{--ink:#1b1d26;--ink-soft:#5b606f;--pos:#2563eb;--neg:#ea580c;--right:#16a34a;--wrong:#e11d48;
    --line:#e6e8ef;--card:#ffffff;--key:#f3f5f9;--key-press:#e3e7f0;--bg:#f7f8fb;--subj:#2563eb;}
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;height:100%;}
  body{font-family:'Noto Sans TC',system-ui,-apple-system,sans-serif;color:var(--ink);
    background:linear-gradient(var(--line) 1px,transparent 1px) 0 0/28px 28px,linear-gradient(90deg,var(--line) 1px,transparent 1px) 0 0/28px 28px,var(--bg);
    display:flex;justify-content:center;padding:14px;}
  .wrap{width:100%;max-width:440px;display:flex;flex-direction:column;gap:14px;}
  header{display:flex;align-items:baseline;justify-content:space-between;padding:2px 2px 0;}
  header h1{font-size:19px;font-weight:700;margin:0;letter-spacing:.5px;}
  header .sub{font-size:12px;color:var(--ink-soft);}
  .streak{font-family:'Lexend',sans-serif;font-size:13px;color:var(--ink-soft);} .streak b{color:var(--ink);font-weight:600;}
  .levels{display:flex;gap:8px;}
  .lv{flex:1;border:none;border-radius:12px;padding:10px 0;font-family:inherit;font-size:14px;font-weight:500;
      background:var(--card);color:var(--ink-soft);border:1.5px solid var(--line);cursor:pointer;transition:.15s;}
  .lv.active{background:var(--ink);color:#fff;border-color:var(--ink);}
  .card{background:var(--card);border:1.5px solid var(--line);border-radius:20px;padding:22px 18px;box-shadow:0 8px 24px -18px rgba(20,25,50,.35);}
  .eq{font-family:'Lexend','Noto Sans TC',sans-serif;font-variant-numeric:tabular-nums;text-align:center;
      font-size:28px;font-weight:600;line-height:1.4;letter-spacing:1px;min-height:44px;}
  .eq .tag{display:inline-block;font-size:11px;color:var(--subj);background:#eaf0fb;border-radius:6px;padding:2px 8px;margin-bottom:12px;letter-spacing:1px;font-weight:500;}
  .eq .op{color:var(--neg);font-weight:700;margin:0 4px;}
  .prompt{font-size:13px;color:var(--ink-soft);text-align:center;margin-top:6px;}
  .dirs{display:flex;gap:8px;margin-top:16px;}
  .dir{flex:1;border:1.5px solid var(--line);border-radius:12px;background:#fbfcfe;height:48px;font-family:'Lexend',sans-serif;
       font-size:22px;color:var(--ink);cursor:pointer;transition:.12s;}
  .dir.on{background:var(--pos);color:#fff;border-color:var(--pos);}
  .ans{margin-top:12px;height:56px;border-radius:14px;border:2px solid var(--line);display:flex;align-items:center;justify-content:center;gap:10px;
       font-family:'Lexend',sans-serif;font-size:26px;font-variant-numeric:tabular-nums;transition:.15s;background:#fbfcfe;}
  .ans .xv{color:var(--ink-soft);} .ans.empty{color:#b7bccb;}
  .ans.ok{border-color:var(--right);color:var(--right);background:#f0fdf4;}
  .ans.no{border-color:var(--wrong);color:var(--wrong);background:#fff1f4;}
  @keyframes shake{10%,90%{transform:translateX(-1px)}30%,70%{transform:translateX(4px)}50%{transform:translateX(-6px)}}
  .shake{animation:shake .35s;}
  .explain{margin-top:16px;border-top:1.5px dashed var(--line);padding-top:16px;display:none;}
  .explain.show{display:block;}
  .steps{font-family:'Lexend','Noto Sans TC',sans-serif;font-variant-numeric:tabular-nums;font-size:16px;line-height:1.95;color:var(--ink);}
  .steps .lead{color:var(--ink-soft);font-family:'Noto Sans TC';font-size:13px;margin-right:6px;}
  .steps .res{color:var(--right);font-weight:700;} .steps .warn{color:var(--neg);font-weight:600;}
  .tip{margin-top:10px;font-size:13px;color:var(--ink-soft);background:#f4f6fb;border-radius:10px;padding:9px 12px;line-height:1.6;}
  .pad{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;}
  .key{border:none;border-radius:14px;background:var(--key);color:var(--ink);font-family:'Lexend',sans-serif;font-size:24px;font-weight:500;height:56px;cursor:pointer;transition:.08s;user-select:none;}
  .key:active{background:var(--key-press);transform:scale(.96);}
  .key.sign{color:var(--neg);font-weight:600;} .key.del{color:var(--ink-soft);font-size:22px;}
  .go{border:none;border-radius:16px;height:56px;width:100%;font-family:inherit;font-size:18px;font-weight:700;letter-spacing:1px;background:var(--ink);color:#fff;cursor:pointer;transition:.12s;}
  .go:active{transform:scale(.98);} .go.next{background:var(--pos);} .go:disabled{opacity:.4;}
</style>
<script type="application/json" id="unit-meta">
{
  "id": "inequality",
  "title": "一元一次不等式",
  "subject": "數學",
  "grade": "國一",
  "term": "下",
  "chapter": 4,
  "ch": "第4章 一元一次不等式",
  "tag": "不等式",
  "ready": true
}
</script>
</head>
<body>
<div class="wrap">
  <header>
    <div><h1>一元一次不等式</h1><div class="sub">隨機出題 · 逐步解說</div></div>
    <div class="streak">連對 <b id="streak">0</b></div>
  </header>
  <div class="levels">
    <button class="lv active" data-lv="basic">基礎</button>
    <button class="lv" data-lv="adv">進階</button>
    <button class="lv" data-lv="mix">混合</button>
  </div>
  <div class="card">
    <div class="eq" id="eq"></div>
    <div class="prompt">選方向、輸入邊界值，得出 x 的範圍</div>
    <div class="dirs" id="dirs">
      <button class="dir" data-d="&gt;">&gt;</button>
      <button class="dir" data-d="&ge;">≥</button>
      <button class="dir" data-d="&lt;">&lt;</button>
      <button class="dir" data-d="&le;">≤</button>
    </div>
    <div class="ans empty" id="ans"><span class="xv">x</span> <span id="ansdir">?</span> <span id="ansval">?</span></div>
    <div class="explain" id="explain"><div class="steps" id="steps"></div><div class="tip" id="tip"></div></div>
  </div>
  <div class="pad" id="pad">
    <button class="key" data-k="7">7</button><button class="key" data-k="8">8</button><button class="key" data-k="9">9</button>
    <button class="key" data-k="4">4</button><button class="key" data-k="5">5</button><button class="key" data-k="6">6</button>
    <button class="key" data-k="1">1</button><button class="key" data-k="2">2</button><button class="key" data-k="3">3</button>
    <button class="key sign" data-k="sign">±</button><button class="key" data-k="0">0</button><button class="key del" data-k="del">⌫</button>
  </div>
  <button class="go" id="go">檢查</button>
</div>

<script>
const rand=(a,b)=>Math.floor(Math.random()*(b-a+1))+a;
const SYM={'>':'>','>=':'≥','<':'<','<=':'≤'};
const FLIP={'>':'<','<':'>','>=':'<=','<=':'>='};
let level='basic', problem=null, curDir=null, entry='', answered=false, streak=0;

function makeProblem(lv){
  const allowNeg = lv==='adv' ? true : lv==='basic' ? false : Math.random()<0.5;
  const dirs=['>','>=','<','<='], finalDir=dirs[rand(0,3)];
  const B=rand(-6,6);
  let a = allowNeg && Math.random()<0.6 ? -rand(2,6) : rand(2,6);
  const b=rand(-9,9), c=a*B+b;
  const dispOp = a>0 ? finalDir : FLIP[finalDir];
  return {a,b,c,dispOp,finalDir,B};
}
function axStr(a){ return a===1?'x':a===-1?'−x':(a<0?'−'+(-a):''+a)+'x'; }
function bStr(b){ return b===0?'':b>0?' + '+b:' − '+(-b); }
function numStr(n){ return n<0?'−'+(-n):''+n; }
function ineqText(){ const p=problem; return axStr(p.a)+bStr(p.b)+' '+SYM[p.dispOp]+' '+numStr(p.c); }
function solText(){ const p=problem; return 'x '+SYM[p.finalDir]+' '+p.B; }

function eqHTML(){ const p=problem;
  return '<span class="tag">解不等式</span><div>'+axStr(p.a)+bStr(p.b)+'<span class="op">'+SYM[p.dispOp]+'</span>'+numStr(p.c)+'</div>'; }
function render(){ document.getElementById('eq').innerHTML=eqHTML(); entry=''; curDir=null; answered=false;
  document.querySelectorAll('.dir').forEach(b=>b.classList.remove('on'));
  showAns();
  document.getElementById('explain').className='explain';
  const go=document.getElementById('go'); go.textContent='檢查'; go.className='go'; go.disabled=false; }
function showAns(){ const ans=document.getElementById('ans');
  document.getElementById('ansdir').textContent = curDir?SYM[curDir]:'?';
  document.getElementById('ansval').textContent = (entry===''||entry==='-')?'?':entry.replace('-','−');
  const filled = curDir && entry!=='' && entry!=='-';
  ans.className = 'ans'+(filled?'':' empty'); }

function buildSteps(){ const p=problem; const rhs=p.c-p.b;
  let out=`<div><span class="lead">移項</span>${axStr(p.a)} ${SYM[p.dispOp]} ${numStr(p.c)} − (${numStr(p.b)}) ＝ ${numStr(rhs)}</div>`;
  out+=`<div>${axStr(p.a)} ${SYM[p.dispOp]} ${numStr(rhs)}</div>`;
  if(p.a<0) out+=`<div><span class="lead">兩邊同除以 ${p.a}</span><span class="warn">負數 → 不等號要變向</span></div>`;
  else out+=`<div><span class="lead">兩邊同除以 ${p.a}</span>正數 → 不等號不變</div>`;
  out+=`<div>∴ <span class="res">x ${SYM[p.finalDir]} ${p.B}</span></div>`;
  return out;
}
function buildTip(){ return '不等式兩邊同乘或同除以「負數」時，不等號方向要反過來；乘除正數則不變。'; }

function check(){ const p=problem; if(!curDir||entry===''||entry==='-') return; answered=true;
  const val=parseInt(entry,10); const correct=(curDir===p.finalDir && val===p.B);
  const ans=document.getElementById('ans'); ans.className='ans '+(correct?'ok':'no');
  if(!correct){ ans.classList.add('shake'); setTimeout(()=>ans.classList.remove('shake'),400); }
  streak=correct?streak+1:0; document.getElementById('streak').textContent=streak;
  if(window.parent!==window){ window.parent.postMessage({type:'unit-progress',unitDone:1,unitCorrect:correct?1:0},'*');
    if(!correct){ window.parent.postMessage({type:'unit-mistake',q:'解 '+ineqText(),ans:solText(),given:'x '+SYM[curDir]+' '+entry.replace('-','−'),steps:buildSteps(),tip:buildTip()},'*'); } }
  document.getElementById('steps').innerHTML=buildSteps();
  document.getElementById('tip').textContent=buildTip();
  document.getElementById('explain').className='explain show';
  const go=document.getElementById('go'); go.textContent='下一題'; go.className='go next';
}
function next(){ problem=makeProblem(level); render(); }

document.getElementById('dirs').addEventListener('click',e=>{ const b=e.target.closest('.dir'); if(!b||answered) return;
  curDir = b.dataset.d==='>'?'>':b.dataset.d==='≥'?'>=':b.dataset.d==='<'?'<':'<=';
  document.querySelectorAll('.dir').forEach(x=>x.classList.remove('on')); b.classList.add('on'); showAns(); });
document.getElementById('pad').addEventListener('click',e=>{ const b=e.target.closest('.key'); if(!b||answered) return; const k=b.dataset.k;
  if(k==='del') entry=entry.slice(0,-1);
  else if(k==='sign') entry=entry.startsWith('-')?entry.slice(1):'-'+entry;
  else { if(entry.replace('-','').length<3) entry+=k; }
  showAns(); });
document.getElementById('go').addEventListener('click',()=> answered?next():check());
document.querySelectorAll('.lv').forEach(b=>b.addEventListener('click',()=>{
  document.querySelectorAll('.lv').forEach(x=>x.classList.remove('active')); b.classList.add('active'); level=b.dataset.lv; next(); }));
document.addEventListener('keydown',e=>{ if(e.key==='Enter'){ answered?next():check(); return; } if(answered) return;
  if(/^[0-9]$/.test(e.key)){ if(entry.replace('-','').length<3) entry+=e.key; showAns(); }
  else if(e.key==='-'){ entry=entry.startsWith('-')?entry.slice(1):'-'+entry; showAns(); }
  else if(e.key==='Backspace'){ entry=entry.slice(0,-1); showAns(); } });
(function(){ const lv=new URLSearchParams(location.search).get('level');
  if(lv==='basic'||lv==='adv'||lv==='mix'){ level=lv; document.querySelectorAll('.lv').forEach(b=>b.classList.toggle('active',b.dataset.lv===lv)); } })();
next();
</script>
<script>
/* ===== 遊戲指令介面：hint（口訣，不洩答案）===== */
(function(){
  function box(){var h=document.getElementById('game-hint');if(!h){h=document.createElement('div');h.id='game-hint';h.style.cssText='margin-top:10px;font-size:13px;background:#fff7ed;border:1.5px solid #fed7aa;color:#9a3412;border-radius:10px;padding:9px 12px;line-height:1.6';var eq=document.getElementById('eq');if(eq&&eq.parentNode){eq.parentNode.insertBefore(h,eq.nextSibling);}else{(document.querySelector('.card')||document.body).appendChild(h);}}return h;}
  function showHint(){if(typeof answered!=='undefined'&&answered)return;var t='';try{t=buildTip();}catch(e){}if(!t)return;box().innerHTML='💡 提示：'+t;}
  function eliminateOne(){showHint();}
  if(typeof next==='function'){var _n=next;next=function(){var h=document.getElementById('game-hint');if(h)h.remove();return _n.apply(this,arguments);};}
  window.addEventListener('message',function(e){var d=e.data;if(!d||d.type!=='unit-command')return;if(d.cmd==='hint')showHint();if(d.cmd==='fifty')eliminateOne();});
  if(window.parent!==window){window.parent.postMessage({type:'unit-ready',supports:['hint']},'*');}
})();
</script>
<script>
/* ===== exam-mode-hook：綜合測驗模式，?exam=1 時交由外層 runner 控制 ===== */
(function(){
  if(new URLSearchParams(location.search).get('exam')!=='1') return;
  document.documentElement.setAttribute('data-exam','1');
  var lv=document.querySelector('.levels'); if(lv) lv.style.display='none';
  var go=document.getElementById('go'); if(!go) return;
  function upd(){ var isNext=go.classList.contains('next')||(go.textContent||'').indexOf('下一題')>=0;
    go.style.display=isNext?'none':''; }
  upd();
  try{ new MutationObserver(upd).observe(go,{attributes:true,childList:true,characterData:true,subtree:true}); }catch(e){}
})();
</script>
</body>
</html>
