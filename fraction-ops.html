<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>分數的四則運算 練習</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@400;500;600;700&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#1b1d26;
    --ink-soft:#5b606f;
    --pos:#2563eb;      /* 正號：藍 */
    --neg:#ea580c;      /* 負號：橘 */
    --right:#16a34a;    /* 答對：綠 */
    --wrong:#e11d48;    /* 答錯：紅 */
    --line:#e6e8ef;
    --card:#ffffff;
    --key:#f3f5f9;
    --key-press:#e3e7f0;
    --bg:#f7f8fb;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;height:100%;}
  body{
    font-family:'Noto Sans TC',system-ui,-apple-system,sans-serif;
    color:var(--ink);
    background:
      linear-gradient(var(--line) 1px,transparent 1px) 0 0/28px 28px,
      linear-gradient(90deg,var(--line) 1px,transparent 1px) 0 0/28px 28px,
      var(--bg);
    display:flex;justify-content:center;
    padding:14px;
  }
  .wrap{width:100%;max-width:440px;display:flex;flex-direction:column;gap:14px;}

  header{display:flex;align-items:baseline;justify-content:space-between;padding:2px 2px 0;}
  header h1{font-size:19px;font-weight:700;margin:0;letter-spacing:.5px;}
  header .sub{font-size:12px;color:var(--ink-soft);}
  .streak{font-family:'Lexend',sans-serif;font-size:13px;color:var(--ink-soft);}
  .streak b{color:var(--ink);font-weight:600;}

  .levels{display:flex;gap:8px;}
  .lv{flex:1;border:none;border-radius:12px;padding:10px 0;font-family:inherit;font-size:14px;
      font-weight:500;background:var(--card);color:var(--ink-soft);border:1.5px solid var(--line);
      cursor:pointer;transition:.15s;}
  .lv.active{background:var(--ink);color:#fff;border-color:var(--ink);}

  .card{background:var(--card);border:1.5px solid var(--line);border-radius:20px;
        padding:26px 18px;box-shadow:0 8px 24px -18px rgba(20,25,50,.35);}

  .eq{font-family:'Lexend','Noto Sans TC',sans-serif;font-variant-numeric:tabular-nums;
      text-align:center;font-size:30px;font-weight:500;line-height:1.35;letter-spacing:.5px;
      word-spacing:2px;min-height:44px;}
  .eq .pos{color:var(--pos);font-weight:600;}
  .eq .neg{color:var(--neg);font-weight:600;}
  .eq .op{color:var(--ink);margin:0 2px;}
  .eq .q{color:var(--ink-soft);}

  .ans{margin-top:18px;height:56px;border-radius:14px;border:2px solid var(--line);
       display:flex;align-items:center;justify-content:center;
       font-family:'Lexend',sans-serif;font-size:28px;font-variant-numeric:tabular-nums;
       transition:.15s;background:#fbfcfe;}
  .ans.empty{color:#b7bccb;}
  .ans.ok{border-color:var(--right);color:var(--right);background:#f0fdf4;}
  .ans.no{border-color:var(--wrong);color:var(--wrong);background:#fff1f4;}
  @keyframes shake{10%,90%{transform:translateX(-1px)}30%,70%{transform:translateX(4px)}50%{transform:translateX(-6px)}}
  .shake{animation:shake .35s;}

  /* 解釋 */
  .explain{margin-top:16px;border-top:1.5px dashed var(--line);padding-top:16px;display:none;}
  .explain.show{display:block;}
  .steps{font-family:'Lexend','Noto Sans TC',sans-serif;font-variant-numeric:tabular-nums;
         font-size:17px;line-height:2;color:var(--ink);}
  .steps .lead{color:var(--ink-soft);font-family:'Noto Sans TC';font-size:13px;margin-right:6px;}
  .steps .pos{color:var(--pos);font-weight:600;}
  .steps .neg{color:var(--neg);font-weight:600;}
  .steps .res{color:var(--right);font-weight:700;}
  .tip{margin-top:10px;font-size:13px;color:var(--ink-soft);background:#f4f6fb;
       border-radius:10px;padding:9px 12px;line-height:1.6;}
  svg{width:100%;height:auto;margin-top:6px;display:block;}

  /* 鍵盤 */
  .pad{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;}
  .key{border:none;border-radius:14px;background:var(--key);color:var(--ink);
       font-family:'Lexend',sans-serif;font-size:24px;font-weight:500;
       height:58px;cursor:pointer;transition:.08s;user-select:none;}
  .key:active{background:var(--key-press);transform:scale(.96);}
  .key.sign{color:var(--neg);font-weight:600;}
  .key.del{color:var(--ink-soft);font-size:22px;}

  .go{border:none;border-radius:16px;height:58px;width:100%;
      font-family:inherit;font-size:18px;font-weight:700;letter-spacing:1px;
      background:var(--ink);color:#fff;cursor:pointer;transition:.12s;}
  .go:active{transform:scale(.98);}
  .go.next{background:var(--pos);}
  .go:disabled{opacity:.4;}
</style>
<script type="application/json" id="unit-meta">
{
  "id": "fraction-ops",
  "title": "分數的四則運算",
  "subject": "數學",
  "grade": "國一",
  "term": "上",
  "chapter": 6,
  "tag": "有理數",
  "ready": true
}
</script>
</head>
<body>
<div class="wrap">

  <header>
    <div>
      <h1>分數的四則運算</h1>
      <div class="sub">通分 · 約分 · 最簡分數</div>
    </div>
    <div class="streak">連對 <b id="streak">0</b></div>
  </header>

  <div class="levels">
    <button class="lv active" data-lv="basic">基礎</button>
    <button class="lv" data-lv="adv">進階</button>
    <button class="lv" data-lv="mix">混合</button>
  </div>

  <div class="card">
    <div class="eq" id="eq"></div>
    <div class="ans empty" id="ans">?</div>

    <div class="explain" id="explain">
      <div class="steps" id="steps"></div>
      <div id="numline"></div>
      <div class="tip" id="tip"></div>
    </div>
  </div>

  <div class="pad" id="pad" style="grid-template-columns:64px 1fr 24px 1fr;">
    <button class="key sign" id="fsign">±</button>
    <input id="fnum" inputmode="numeric" maxlength="3" placeholder="分子" autocomplete="off"
      style="min-width:0;height:58px;border:1.5px solid var(--line);border-radius:14px;background:var(--card);font-family:'Lexend',sans-serif;font-size:24px;text-align:center;color:var(--ink);outline:none;">
    <div style="display:flex;align-items:center;justify-content:center;font-size:26px;color:var(--ink-soft);">∕</div>
    <input id="fden" inputmode="numeric" maxlength="3" placeholder="分母" autocomplete="off"
      style="min-width:0;height:58px;border:1.5px solid var(--line);border-radius:14px;background:var(--card);font-family:'Lexend',sans-serif;font-size:24px;text-align:center;color:var(--ink);outline:none;">
  </div>

  <button class="go" id="go">檢查</button>
</div>

<script>
/* ===== gen-start ===== */
const rand=(a,b)=>Math.floor(Math.random()*(b-a+1))+a;
function gcd(a,b){ while(b){ const t=a%b; a=b; b=t; } return a; }
const lcm=(a,b)=>a*b/gcd(a,b);
const F=(s,n,d)=>({s,n,d});                       // 分數 {s:±1, n:正分子, d:正分母}
function reduce(s,n,d){ if(n===0) return {s:1,n:0,d:1}; const g=gcd(n,d); return {s,n:n/g,d:d/g}; }
function fAdd(A,B,sub){ const L=lcm(A.d,B.d);
  const v=A.s*A.n*(L/A.d)+(sub?-1:1)*B.s*B.n*(L/B.d);
  return reduce(v<0?-1:1,Math.abs(v),L); }
function fMul(A,B){ return reduce(A.s*B.s,A.n*B.n,A.d*B.d); }
function fDiv(A,B){ return reduce(A.s*B.s,A.n*B.d,A.d*B.n); }
const ok=r=> r.n>=1 && r.d>=2 && r.d<=48 && r.n<=99;   // 非 0、非整數、可輸入大小
const sg=on=> on&&Math.random()<0.35?-1:1;

function genSame(){ let A,B,sub,r;   // 基礎：同分母加減（正、結果正）
  do{ const d=rand(3,12); A=F(1,rand(1,d-1),d); B=F(1,rand(1,d-1),d);
      sub=Math.random()<0.5; r=fAdd(A,B,sub); }while(!ok(r)||r.s<0);
  return {op:sub?'sub':'add',A,B,answer:r}; }
function genEasy(){ let A,B,sub,r;   // 基礎：簡單異分母（分母成倍數）
  do{ const d1=rand(2,6),d2=d1*rand(2,4); A=F(1,rand(1,d1-1<1?1:d1-1),d1); B=F(1,rand(1,d2-1),d2);
      if(Math.random()<0.5){ const t=A; A=B; B=t; }
      sub=Math.random()<0.5; r=fAdd(A,B,sub); }while(!ok(r)||r.s<0);
  return {op:sub?'sub':'add',A,B,answer:r}; }
function genMul(signed){ let A,B,r;
  do{ A=F(sg(signed),rand(1,9),rand(2,9)); B=F(sg(signed),rand(1,9),rand(2,9)); r=fMul(A,B);
    }while(!ok(r)||(!signed&&r.s<0));
  return {op:'mul',A,B,answer:r}; }
function genAdd(){ let A,B,sub,r;    // 進階：一般異分母、含負分數
  do{ const d1=rand(2,12); let d2; do{ d2=rand(2,12); }while(d2===d1);
      A=F(sg(true),rand(1,11),d1); B=F(sg(true),rand(1,11),d2);
      sub=Math.random()<0.5; r=fAdd(A,B,sub); }while(!ok(r));
  return {op:sub?'sub':'add',A,B,answer:r}; }
function genDiv(){ let A,B,r;
  do{ A=F(sg(true),rand(1,9),rand(2,9)); B=F(sg(true),rand(1,9),rand(2,9)); r=fDiv(A,B); }while(!ok(r));
  return {op:'div',A,B,answer:r}; }

function makeProblem(lv){
  if(lv==='basic'){ const r=Math.random(); return r<1/3?genSame():r<2/3?genEasy():genMul(false); }
  if(lv==='adv') return Math.random()<0.5?genAdd():genDiv();
  const r=Math.random();
  return r<0.3?genAdd():r<0.55?genMul(true):r<0.8?genDiv():genSame();
}
/* ===== gen-end ===== */

let level='basic', problem=null, answered=false, streak=0, fsign=1;

const OPCH={add:'＋',sub:'－',mul:'×',div:'÷'};
const pf=f=>(f.s<0?'−':'')+f.n+'/'+f.d;
function qText(){ const p=problem; return `(${pf(p.A)}) ${OPCH[p.op]} (${pf(p.B)}) =`; }

const fr=f=>`${f.s<0?'<span class="neg">−</span>':''}<span style="display:inline-block;vertical-align:-0.4em;text-align:center;line-height:1.15;font-size:.72em;"><span style="display:block;padding:0 9px;border-bottom:2.5px solid currentColor;">${f.n}</span><span style="display:block;padding:0 9px;">${f.d}</span></span>`;
const wrap=f=> f.s<0?`<span class="op">(</span> ${fr(f)} <span class="op">)</span>`:fr(f);
function eqHTML(){ const p=problem;
  return `${wrap(p.A)} <span class="op">${OPCH[p.op]}</span> ${wrap(p.B)} <span class="op">=</span> <span class="q">?</span>`;
}

const elNum=()=>document.getElementById('fnum');
const elDen=()=>document.getElementById('fden');
function render(){
  document.getElementById('eq').innerHTML=eqHTML();
  answered=false; fsign=1;
  elNum().value=''; elDen().value='';
  elNum().readOnly=false; elDen().readOnly=false;
  document.getElementById('fsign').textContent='±';
  const ans=document.getElementById('ans'); ans.textContent='?'; ans.className='ans empty';
  document.getElementById('explain').className='explain';
  const go=document.getElementById('go'); go.textContent='檢查'; go.className='go'; go.disabled=false;
}
function showEntry(){ const ans=document.getElementById('ans');
  const n=elNum().value.trim(), d=elDen().value.trim();
  if(n===''&&d===''&&fsign>0){ ans.textContent='?'; ans.className='ans empty'; return; }
  ans.textContent=`${fsign<0?'−':''}${n||'▢'}∕${d||'▢'}`;
  ans.className=(n&&d)?'ans':'ans empty';
}

function buildSteps(){ const p=problem, A=p.A, B=p.B, ans=p.answer;
  const sTerm=(s,n)=>`${s<0?'−':''}${n}`;
  if(p.op==='add'||p.op==='sub'){
    const L=lcm(A.d,B.d), a2=A.s*A.n*(L/A.d), b2=B.s*B.n*(L/B.d);
    const v=a2+(p.op==='sub'?-b2:b2);
    const raw={s:v<0?-1:1,n:Math.abs(v),d:L};
    let out='';
    if(A.d!==B.d){
      out+=`<div><span class="lead">通分</span>分母取最小公倍數：[${A.d}, ${B.d}] = ${L}</div>`;
      out+=`<div>${wrap(A)} = ${fr({s:a2<0?-1:1,n:Math.abs(a2),d:L})}，${wrap(B)} = ${fr({s:b2<0?-1:1,n:Math.abs(b2),d:L})}</div>`;
    }
    out+=`<div><span class="lead">分子${p.op==='sub'?'相減':'相加'}</span>${sTerm(a2<0?-1:1,Math.abs(a2))} ${p.op==='sub'?'−':'＋'} (${sTerm(b2<0?-1:1,Math.abs(b2))}) = ${v} → ${fr(raw)}</div>`;
    if(raw.n!==ans.n||raw.d!==ans.d) out+=`<div><span class="lead">約分</span>${fr(raw)} = ${fr(ans)}</div>`;
    return out+`<div>= <span class="res">${fr(ans)}</span></div>`;
  }
  let X=A, Y=B, out='';
  if(p.op==='div'){
    Y=F(B.s,B.d,B.n);
    out+=`<div><span class="lead">倒數</span>除以分數＝乘以它的倒數：${wrap(A)} × ${wrap(Y)}</div>`;
  }
  if(X.s*Y.s<0||X.s<0) out+=`<div><span class="lead">符號</span>${X.s*Y.s>0?'同號得正':'異號得負'}</div>`;
  const raw={s:X.s*Y.s,n:X.n*Y.n,d:X.d*Y.d};
  out+=`<div><span class="lead">相乘</span>分子×分子、分母×分母：${X.n}×${Y.n} ∕ ${X.d}×${Y.d} = ${fr({s:1,n:raw.n,d:raw.d})}</div>`;
  if(raw.n!==ans.n||raw.d!==ans.d) out+=`<div><span class="lead">約分</span>${fr({s:1,n:raw.n,d:raw.d})} = ${fr({s:1,n:ans.n,d:ans.d})}</div>`;
  return out+`<div>= <span class="res">${fr(ans)}</span></div>`;
}
function buildTip(){ const p=problem;
  if(p.op==='mul') return '分數乘法：分子乘分子、分母乘分母；先約分再乘會更快。答案要化到最簡分數。';
  if(p.op==='div') return '除以一個分數＝乘以它的倒數（分子分母顛倒）。';
  return '分母不同要先通分（取分母的最小公倍數），分子才能加減；答案要化到最簡分數。';
}

function check(){
  const nS=elNum().value.trim(), dS=elDen().value.trim();
  if(!/^\d+$/.test(nS)||!/^\d+$/.test(dS)) return;
  const D=parseInt(dS,10); if(D===0) return;
  answered=true;
  elNum().readOnly=true; elDen().readOnly=true;
  const u=reduce(fsign,parseInt(nS,10),D);
  const a=problem.answer;
  const correct = u.s===a.s && u.n===a.n && u.d===a.d;   // 雙方皆最簡分數再比
  const ans=document.getElementById('ans');
  ans.className='ans '+(correct?'ok':'no');
  ans.textContent=`${fsign<0?'−':''}${nS}∕${dS}`;
  if(!correct){ ans.classList.add('shake'); setTimeout(()=>ans.classList.remove('shake'),400); }

  streak = correct?streak+1:0;
  document.getElementById('streak').textContent=streak;

  if(window.parent!==window){
    window.parent.postMessage({type:'unit-progress', unitDone:1, unitCorrect:correct?1:0}, '*');
    if(!correct){ window.parent.postMessage({type:'unit-mistake', q:qText(), ans:pf(problem.answer), given:`${fsign<0?'−':''}${nS}/${dS}`, steps:(typeof buildSteps==='function'?buildSteps():''), tip:(typeof buildTip==='function'?buildTip():'')}, '*'); }
  }

  document.getElementById('steps').innerHTML=buildSteps();
  document.getElementById('numline').innerHTML='';
  document.getElementById('tip').textContent=buildTip();
  document.getElementById('explain').className='explain show';
  const go=document.getElementById('go'); go.textContent='下一題'; go.className='go next';
}
function next(){ problem=makeProblem(level); render(); }

document.getElementById('fsign').addEventListener('click',()=>{
  if(answered) return; fsign=-fsign;
  document.getElementById('fsign').textContent = fsign<0?'−':'±';
  showEntry();
});
['fnum','fden'].forEach(id=>{
  const el=document.getElementById(id);
  el.addEventListener('input',()=>{ el.value=el.value.replace(/[^0-9]/g,'').slice(0,3); showEntry(); });
});
document.getElementById('go').addEventListener('click',()=> answered?next():check());
document.querySelectorAll('.lv').forEach(b=>b.addEventListener('click',()=>{
  document.querySelectorAll('.lv').forEach(x=>x.classList.remove('active'));
  b.classList.add('active'); level=b.dataset.lv; next();
}));
document.addEventListener('keydown',e=>{
  if(e.key==='Enter'){ answered?next():check(); return; }
  if(answered) return;
  if(e.key==='-'){ e.preventDefault(); fsign=-fsign;
    document.getElementById('fsign').textContent = fsign<0?'−':'±'; showEntry(); }
});

(function(){ const lv=new URLSearchParams(location.search).get('level');
  if(lv==='basic'||lv==='adv'||lv==='mix'){ level=lv; document.querySelectorAll('.lv').forEach(b=>b.classList.toggle('active',b.dataset.lv===lv)); }
})();

next();
</script>

<script>
/* ===== 遊戲指令介面：外層 RPG 可對本題下技能（hint/fifty）。單獨用瀏覽器開啟時不受影響。 ===== */
(function(){
  function box(){var h=document.getElementById('game-hint');if(!h){h=document.createElement('div');h.id='game-hint';h.style.cssText='margin-top:10px;font-size:13px;background:#fff7ed;border:1.5px solid #fed7aa;color:#9a3412;border-radius:10px;padding:9px 12px;line-height:1.6';var eq=document.getElementById('eq');if(eq&&eq.parentNode){eq.parentNode.insertBefore(h,eq.nextSibling);}else{(document.querySelector('.card')||document.body).appendChild(h);}}return h;}
  function showHint(){if(typeof answered!=='undefined'&&answered)return;var t='';try{t=buildTip();}catch(e){}if(!t)return;box().innerHTML='💡 提示：'+t;}
  function eliminateOne(){showHint();}          /* 數字輸入題：先給弱提示（沿用 buildTip） */
  if(typeof next==='function'){var _n=next;next=function(){var h=document.getElementById('game-hint');if(h)h.remove();return _n.apply(this,arguments);};}
  window.addEventListener('message',function(e){var d=e.data;if(!d||d.type!=='unit-command')return;if(d.cmd==='hint')showHint();if(d.cmd==='fifty')eliminateOne();});
  if(window.parent!==window){window.parent.postMessage({type:'unit-ready',supports:['hint']},'*');}
})();
</script>
<script>
/* ===== exam-mode-hook：綜合測驗模式，?exam=1 時交由外層 runner 控制 ===== */
(function(){
  if(new URLSearchParams(location.search).get('exam')!=='1') return;
  document.documentElement.setAttribute('data-exam','1');
  var lv=document.querySelector('.levels'); if(lv) lv.style.display='none';
  var go=document.getElementById('go'); if(!go) return;
  function upd(){ var isNext=go.classList.contains('next')||(go.textContent||'').indexOf('下一題')>=0;
    go.style.display=isNext?'none':''; }
  upd();
  try{ new MutationObserver(upd).observe(go,{attributes:true,childList:true,characterData:true,subtree:true}); }catch(e){}
})();
</script>
</body>
</html>
