<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>學習聯絡簿</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@400;500;600;700&family=Noto+Sans+TC:wght@400;500;700&family=Noto+Serif+TC:wght@600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root{--paper:#f6f5ef;--card:#fffdf8;--ink:#2b2b28;--muted:#8a857b;--line:#e5e2d8;--seal:#c1352b;--blue:#2563eb;--orange:#ea580c;--ok:#3f7d4e;}
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;height:100%;}
  body{font-family:'Noto Sans TC',system-ui,sans-serif;color:var(--ink);
    background:linear-gradient(var(--line) 1px,transparent 1px) 0 0/30px 30px,linear-gradient(90deg,var(--line) 1px,transparent 1px) 0 0/30px 30px,var(--paper);
    -webkit-font-smoothing:antialiased;}
  .app{max-width:460px;margin:0 auto;min-height:100vh;padding:0 16px 96px;}
  .num{font-family:'Lexend',sans-serif;font-variant-numeric:tabular-nums;}
  h1,h2,h3{margin:0;} button{font-family:inherit;cursor:pointer;border:none;} .hidden{display:none !important;}
  .top{display:flex;align-items:center;justify-content:space-between;padding:22px 2px 12px;}
  .brand{display:flex;align-items:center;gap:10px;}
  .seal-mini{width:34px;height:34px;border:2px solid var(--seal);border-radius:8px;color:var(--seal);font-family:'Noto Serif TC',serif;font-weight:700;font-size:19px;display:flex;align-items:center;justify-content:center;transform:rotate(-6deg);}
  .brand h1{font-family:'Noto Serif TC',serif;font-size:20px;letter-spacing:1px;}
  .streak-chip{font-size:12px;color:var(--seal);background:#fbeeec;border:1px solid #f0d5d1;border-radius:99px;padding:5px 11px;font-weight:500;white-space:nowrap;}
  .streak-chip .n{font-family:'Lexend',sans-serif;font-weight:700;}
  .card{background:var(--card);border:1.5px solid var(--line);border-radius:18px;padding:18px;box-shadow:0 6px 20px -16px rgba(60,50,20,.4);margin-bottom:14px;}
  .datebar{display:flex;align-items:flex-end;gap:12px;margin:4px 2px 14px;}
  .datebar .d{font-family:'Lexend',sans-serif;font-size:44px;font-weight:600;line-height:.9;}
  .datebar .my{color:var(--muted);font-size:14px;padding-bottom:4px;} .datebar .wd{margin-left:auto;color:var(--muted);font-size:14px;padding-bottom:6px;}
  .sec-label{font-size:13px;color:var(--muted);letter-spacing:2px;margin:6px 2px 10px;font-weight:500;}
  .rest-banner{background:#eef3ee;border:1.5px solid #d7e4d8;border-radius:16px;padding:14px 16px;margin-bottom:14px;font-size:15px;color:var(--ok);}
  .reward{display:flex;align-items:center;gap:14px;background:#fbf1e9;border:1.5px solid #f0dcc9;border-radius:16px;padding:16px;margin-bottom:14px;}
  .reward .r-txt{font-size:15px;line-height:1.5;} .reward .r-txt b{color:var(--seal);}
  .task{display:flex;align-items:center;gap:14px;padding:14px 0;border-bottom:1px solid var(--line);}
  .task:last-child{border-bottom:none;} .task .info{flex:1;min-width:0;}
  .task .t-name{font-weight:500;font-size:16px;} .task .t-sub{font-size:12px;color:var(--muted);margin-top:2px;}
  .bar{height:7px;background:#eceadf;border-radius:99px;margin-top:9px;overflow:hidden;} .bar > i{display:block;height:100%;background:var(--blue);border-radius:99px;transition:width .4s;}
  .task .cnt{font-family:'Lexend',sans-serif;font-size:13px;color:var(--muted);margin-top:6px;}
  .start{background:var(--ink);color:#fff;border-radius:12px;padding:11px 16px;font-size:14px;font-weight:500;white-space:nowrap;}
  .seal-done{width:52px;height:52px;flex:none;border:2.5px solid var(--seal);border-radius:10px;color:var(--seal);font-family:'Noto Serif TC',serif;font-weight:700;font-size:26px;display:flex;align-items:center;justify-content:center;transform:rotate(-8deg);opacity:.92;}
  .empty{text-align:center;color:var(--muted);padding:30px 10px;font-size:14px;line-height:1.7;} .empty b{color:var(--ink);}
  .cal-head{display:flex;align-items:center;justify-content:space-between;margin:2px 2px 14px;}
  .cal-head h2{font-family:'Lexend',sans-serif;font-size:18px;font-weight:600;}
  .cal-nav{background:#eceadf;border-radius:10px;width:38px;height:38px;font-size:18px;color:var(--ink);}
  .grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;} .dow{text-align:center;font-size:11px;color:var(--muted);padding:4px 0;}
  .cell{aspect-ratio:1;border-radius:10px;display:flex;align-items:center;justify-content:center;position:relative;font-family:'Lexend',sans-serif;font-size:14px;color:var(--ink);}
  .cell.pad{visibility:hidden;} .cell.has{cursor:pointer;} .cell.today{outline:2px solid var(--blue);outline-offset:-2px;}
  .cell.rest{background:#f0f3f0;} .cell .stamp{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:var(--seal);font-family:'Noto Serif TC',serif;font-weight:700;font-size:20px;transform:rotate(-10deg);opacity:.9;}
  .cell.partial::after{content:"";position:absolute;bottom:5px;width:5px;height:5px;border-radius:99px;background:var(--orange);} .cell.num-dim{color:var(--muted);}
  .course-pick{margin-bottom:12px;} .course-pick label{display:block;font-size:13px;color:var(--muted);margin-bottom:6px;}
  select.course{width:100%;padding:12px;border:1.5px solid var(--line);border-radius:12px;background:#fff;font-family:inherit;font-size:15px;color:var(--ink);}
  .unit{padding:14px 0;border-bottom:1px solid var(--line);} .unit:last-child{border-bottom:none;}
  .unit-head{display:flex;align-items:center;gap:12px;} .unit .u-info{flex:1;min-width:0;}
  .unit .u-name{font-weight:500;} .unit .u-sub{font-size:12px;color:var(--muted);margin-top:2px;}
  .badge{font-size:11px;color:var(--muted);background:#eceadf;border-radius:6px;padding:3px 7px;white-space:nowrap;}
  .subj{margin-bottom:14px;}
  .subj-head{display:flex;align-items:center;gap:13px;padding:14px 16px;background:var(--card);border:1.5px solid var(--line);border-radius:16px;cursor:pointer;box-shadow:0 6px 20px -16px rgba(60,50,20,.4);transition:.15s;}
  .subj-head:active{transform:scale(.995);}
  .subj.open .subj-head{border-radius:16px 16px 0 0;box-shadow:none;}
  .subj-ic{width:42px;height:42px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:21px;flex:none;}
  .subj-tt{flex:1;min-width:0;} .subj-tt .nm{font-family:'Noto Serif TC',serif;font-size:17px;font-weight:700;letter-spacing:1px;}
  .subj-tt .mt{font-size:12px;color:var(--muted);margin-top:3px;} .subj-tt .mt .n{font-family:'Lexend',sans-serif;font-weight:700;color:var(--ink);}
  .subj-dot{display:inline-block;width:6px;height:6px;border-radius:99px;margin:0 6px;vertical-align:middle;opacity:.5;}
  .subj-chev{flex:none;color:var(--muted);font-size:12px;transition:transform .25s;}
  .subj:not(.open) .subj-chev{transform:rotate(-90deg);}
  .subj-body{background:var(--card);border:1.5px solid var(--line);border-top:none;border-radius:0 0 16px 16px;padding:2px 16px 6px;box-shadow:0 6px 20px -16px rgba(60,50,20,.4);}
  .subj:not(.open) .subj-body{display:none;}
  .toggle{width:48px;height:28px;border-radius:99px;background:#d8d5c9;position:relative;transition:.2s;flex:none;} .toggle.on{background:var(--blue);} .toggle.off-disabled{opacity:.4;}
  .toggle i{position:absolute;top:3px;left:3px;width:22px;height:22px;border-radius:99px;background:#fff;transition:.2s;} .toggle.on i{left:23px;}
  .cfg{margin-top:12px;padding:12px;background:#faf8f1;border-radius:12px;display:flex;flex-direction:column;gap:12px;}
  .cfg-row{display:flex;align-items:center;justify-content:space-between;gap:10px;} .cfg-row .lbl{font-size:13px;color:var(--muted);}
  .goal-in{width:64px;padding:8px;border:1.5px solid var(--line);border-radius:9px;font-family:'Lexend',sans-serif;font-size:15px;text-align:center;background:#fff;}
  .seg{display:flex;background:#eceadf;border-radius:9px;padding:2px;} .seg button{background:none;padding:7px 12px;font-size:13px;color:var(--muted);border-radius:7px;}
  .seg button.on{background:#fff;color:var(--ink);font-weight:500;box-shadow:0 1px 3px rgba(0,0,0,.08);}
  .restdays{display:flex;gap:6px;} .rd{flex:1;padding:11px 0;text-align:center;border-radius:10px;background:#eceadf;color:var(--muted);font-size:15px;}
  .rd.on{background:#fbeeec;color:var(--seal);font-weight:600;box-shadow:inset 0 0 0 1px #f0d5d1;}
  .mk-unit{font-size:13px;color:var(--muted);margin:16px 2px 8px;font-weight:500;}
  .mk{background:#faf8f1;border:1.5px solid var(--line);border-radius:14px;padding:14px;margin-bottom:10px;}
  .mk .q{font-family:'Lexend','Noto Sans TC',sans-serif;font-size:21px;font-variant-numeric:tabular-nums;}
  .mk .meta{font-size:12px;color:var(--muted);margin-top:6px;}
  .mk .ans{margin-top:10px;font-size:17px;color:var(--ok);font-family:'Lexend',sans-serif;display:none;} .mk.reveal .ans{display:block;}
  .mk .detail{display:none;margin-top:12px;padding-top:12px;border-top:1px dashed var(--line);} .mk.reveal .detail{display:block;}
  .mk .detail-label{font-size:12px;color:var(--muted);letter-spacing:2px;margin-bottom:6px;}
  .mk .detail .steps{font-family:'Lexend','Noto Sans TC',sans-serif;font-variant-numeric:tabular-nums;font-size:15px;line-height:1.9;color:var(--ink);}
  .mk .detail .steps .lead{color:var(--muted);font-size:12px;margin-right:6px;}
  .mk .detail .steps .pos{color:var(--blue);font-weight:600;} .mk .detail .steps .neg{color:var(--orange);font-weight:600;} .mk .detail .steps .res{color:var(--ok);font-weight:700;}
  .mk .detail .d-tip{margin-top:8px;font-size:12px;color:var(--muted);background:#faf8f1;border-radius:8px;padding:8px 10px;line-height:1.6;}
  .mk .acts{display:flex;gap:8px;margin-top:12px;} .mk .reveal-btn{flex:1;background:#eceadf;border-radius:10px;padding:10px;font-size:14px;color:var(--ink);}
  .mk .done-btn{background:var(--ink);color:#fff;border-radius:10px;padding:10px 14px;font-size:14px;}
  .mk .done-btn:disabled{opacity:.4;}
  .mk .recheck{display:flex;gap:8px;align-items:center;margin-top:10px;flex-wrap:wrap;}
  .mk .recheck input{flex:1;min-width:120px;padding:9px 12px;border:1.5px solid var(--line);border-radius:10px;font-family:'Lexend',sans-serif;font-size:15px;background:#fff;}
  .mk .recheck button{background:var(--blue);color:#fff;border-radius:10px;padding:9px 14px;font-size:14px;}
  .mk .recheck .r{font-size:13px;width:100%;} .mk .recheck .r.ok{color:var(--ok);} .mk .recheck .r.no{color:var(--seal);}
  .auth-wrap{max-width:400px;margin:0 auto;padding:60px 20px;} .auth-brand{text-align:center;margin-bottom:30px;}
  .auth-brand .seal-mini{margin:0 auto 14px;width:60px;height:60px;font-size:34px;border-radius:12px;} .auth-brand h1{font-family:'Noto Serif TC',serif;font-size:26px;letter-spacing:2px;} .auth-brand p{color:var(--muted);font-size:13px;margin-top:8px;}
  .field{margin-bottom:12px;} .field label{display:block;font-size:13px;color:var(--muted);margin-bottom:6px;}
  .field input{width:100%;padding:13px;border:1.5px solid var(--line);border-radius:12px;font-family:inherit;font-size:16px;background:#fff;}
  .primary{width:100%;background:var(--ink);color:#fff;padding:14px;border-radius:13px;font-size:16px;font-weight:600;margin-top:6px;}
  .link-btn{background:none;color:var(--blue);font-size:14px;width:100%;padding:14px;margin-top:4px;}
  .msg{font-size:13px;padding:10px 12px;border-radius:10px;margin-bottom:12px;line-height:1.6;} .msg.err{background:#fdecea;color:#b3261e;} .msg.ok{background:#eaf5ec;color:var(--ok);}
  .play-bar{display:flex;align-items:center;gap:12px;padding:14px 2px;} .back{background:#eceadf;border-radius:10px;padding:9px 14px;font-size:14px;color:var(--ink);}
  .play-bar .p-title{font-weight:500;} .play-bar .p-live{margin-left:auto;font-family:'Lexend',sans-serif;font-size:13px;color:var(--muted);}
  .frame{width:100%;height:calc(100vh - 130px);border:1.5px solid var(--line);border-radius:16px;background:#fff;}
  .nav{position:fixed;bottom:0;left:0;right:0;background:rgba(255,253,248,.94);backdrop-filter:blur(8px);border-top:1.5px solid var(--line);}
  .nav-inner{max-width:460px;margin:0 auto;display:flex;} .nav button{flex:1;background:none;padding:10px 0 14px;color:var(--muted);font-size:11px;display:flex;flex-direction:column;align-items:center;gap:4px;}
  .nav button .ic{font-size:20px;line-height:1;} .nav button.on{color:var(--ink);}
  .sheet-bg{position:fixed;inset:0;background:rgba(30,26,18,.4);display:flex;align-items:flex-end;z-index:20;}
  .sheet{background:var(--card);width:100%;max-width:460px;margin:0 auto;border-radius:20px 20px 0 0;padding:20px 18px 30px;}
  .sheet h3{font-family:'Lexend',sans-serif;font-size:16px;margin-bottom:4px;} .sheet .s-date{color:var(--muted);font-size:13px;margin-bottom:14px;}
  .sheet .s-row{display:flex;justify-content:space-between;padding:11px 0;border-bottom:1px solid var(--line);font-size:15px;} .sheet .s-row:last-child{border-bottom:none;} .sheet .s-row .n{font-family:'Lexend',sans-serif;color:var(--muted);}
  .sheet .close{margin-top:16px;width:100%;background:#eceadf;padding:12px;border-radius:12px;font-size:15px;color:var(--ink);}
  textarea.reward-in{width:100%;padding:12px;border:1.5px solid var(--line);border-radius:12px;font-family:inherit;font-size:15px;background:#fff;resize:vertical;min-height:70px;}
</style>
</head>
<body>

<div id="view-auth" class="auth-wrap">
  <div class="auth-brand"><div class="seal-mini">學</div><h1>學習聯絡簿</h1><p>登入後每天的練習紀錄都存在雲端，換裝置也還在</p></div>
  <div id="auth-msg"></div>
  <div class="field"><label>帳號（電子郵件）</label><input id="au-email" type="email" autocomplete="username" placeholder="例如 kid@family.tw"></div>
  <div class="field"><label>密碼</label><input id="au-pass" type="password" autocomplete="current-password" placeholder="至少 6 個字"></div>
  <button class="primary" id="au-login">登入</button>
  <button class="link-btn" id="au-signup">第一次使用？建立帳號</button>
</div>

<div id="view-main" class="app hidden">
  <div class="top"><div class="brand"><div class="seal-mini">學</div><h1>學習聯絡簿</h1></div><div class="streak-chip hidden" id="streak-chip"></div></div>

  <section id="tab-today">
    <div class="datebar"><div class="d num" id="td-day">–</div><div class="my num" id="td-my"></div><div class="wd" id="td-wd"></div></div>
    <div id="rest-slot"></div><div id="reward-slot"></div>
    <div class="sec-label" id="who"></div>
    <div class="sec-label">今日任務</div>
    <div class="card" id="today-tasks"></div>
  </section>

  <section id="tab-cal" class="hidden">
    <div class="cal-head"><button class="cal-nav" id="cal-prev">‹</button><h2 id="cal-title"></h2><button class="cal-nav" id="cal-next">›</button></div>
    <div class="card"><div class="grid" id="cal-dow"></div><div class="grid" id="cal-grid" style="margin-top:4px;"></div></div>
  </section>

  <section id="tab-wrong" class="hidden">
    <div class="sec-label">錯題本 · 把答錯的題目再看一遍</div>
    <div id="mistake-list"></div>
  </section>

  <section id="tab-units" class="hidden">
    <div class="sec-label">課本版本</div>
    <div class="card">
      <div class="course-pick"><label>選擇孩子學校用的版本，單元會照那個順序排列</label><select class="course" id="course-select"></select></div>
      <div style="font-size:12px;color:var(--muted);line-height:1.6;">版本順序為參考值，可依實際課本調整。標「準備中」的單元做好後會自動開放。</div>
    </div>
    <div class="sec-label">單元 · 打開老師教過的，設每天題數</div>
    <div id="unit-list"></div>
  </section>

  <section id="tab-me" class="hidden">
    <div class="card">
      <div class="field"><label>顯示名稱</label><input id="me-name" type="text" placeholder="孩子的名字"></div>
      <div class="field"><label>完成獎勵訊息（當天全部做完時跳出）</label><textarea class="reward-in" id="me-reward" placeholder="例如：今天全部完成，可以看 30 分鐘卡通！"></textarea></div>
      <button class="primary" id="me-save">儲存</button>
    </div>
    <div class="card">
      <div class="sec-label" style="margin:0 0 10px">休息日（這幾天不排任務，也不會中斷連續紀錄）</div>
      <div class="restdays" id="restdays"></div>
    </div>
    <div class="card" style="text-align:center;">
      <div id="me-email" style="color:var(--muted);font-size:13px;margin-bottom:14px;"></div>
      <button class="back" id="me-logout" style="display:inline-block;">登出</button>
    </div>
  </section>
</div>

<div id="view-play" class="app hidden">
  <div class="play-bar"><button class="back" id="play-back">‹ 返回</button><div class="p-title" id="play-title"></div><div class="p-live num" id="play-live"></div></div>
  <iframe id="play-frame" class="frame"></iframe>
</div>

<nav class="nav hidden" id="nav"><div class="nav-inner">
  <button data-tab="today" class="on"><span class="ic">📖</span>今日</button>
  <button data-tab="cal"><span class="ic">📅</span>月曆</button>
  <button data-tab="wrong"><span class="ic">📝</span>錯題本</button>
  <button data-tab="units"><span class="ic">📚</span>單元</button>
  <button data-tab="me"><span class="ic">🙂</span>我</button>
</div></nav>

<div id="sheet-root"></div>

<script>
const SUPABASE_URL  = "https://xmkenwcqxbjeqyzigdoj.supabase.co";
const SUPABASE_ANON = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inhta2Vud2NxeGJqZXF5emlnZG9qIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMyODYxMjEsImV4cCI6MjA5ODg2MjEyMX0.2Imp7H39wt5m4tZ4V3W0y0lyPqYu61a2liWnlytZzLc";

const CONFIGURED = !SUPABASE_URL.includes("在這裡") && !SUPABASE_ANON.includes("在這裡");
let sb = CONFIGURED ? supabase.createClient(SUPABASE_URL, SUPABASE_ANON) : null;
const WD=["日","一","二","三","四","五","六"];
const $=id=>document.getElementById(id);
const fmtDate=d=>`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
const todayStr=()=>fmtDate(new Date());
const escapeHtml=s=>(s||"").replace(/[&<>]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;"}[c]));

let UNITS=[], COURSES=[], MISTAKES=[], SUBJECTS=[], collapsedSubj={};
let settings={display_name:"",course_id:"",reward_msg:"",selected_units:[],daily_goals:{},rest_days:[]};
let todayAct={}, calMonth=new Date(), playUnit=null, playLevel="mix", playPractice=false;

function cfg(uid){ let g=settings.daily_goals[uid];
  if(g==null) return {target:10,mode:"attempts",level:"mix"};
  if(typeof g==="number") return {target:g,mode:"attempts",level:"mix"};
  return {target:g.target||10,mode:g.mode||"attempts",level:g.level||"mix"}; }
function unit(uid){ return UNITS.find(u=>u.id===uid)||{title:uid,ready:false}; }
function enabledUnits(){ return settings.selected_units.filter(u=>settings.daily_goals[u]!=null); }
function val(uid,act){ return cfg(uid).mode==="correct"?(act?.correct||0):(act?.done||0); }
function isRestDay(d){ return (settings.rest_days||[]).includes(d.getDay()); }

async function boot(){
  if(!CONFIGURED){ showAuth(); authMsg("err","尚未設定 Supabase，請先填入鑰匙。"); return; }
  await loadUnits();
  const {data:{session}}=await sb.auth.getSession();
  if(session) enterApp(); else showAuth();
  sb.auth.onAuthStateChange((_e,s)=>{ if(s) enterApp(); else showAuth(); });
}
async function loadUnits(){ try{ const j=await (await fetch("units.json",{cache:"no-store"})).json(); UNITS=j.units||[]; COURSES=j.courses||[]; SUBJECTS=j.subjects||[]; }catch(e){ UNITS=[]; COURSES=[]; SUBJECTS=[]; } }

function showAuth(){ $("view-auth").classList.remove("hidden"); $("view-main").classList.add("hidden"); $("view-play").classList.add("hidden"); $("nav").classList.add("hidden"); }
function authMsg(k,t){ $("auth-msg").innerHTML=t?`<div class="msg ${k}">${t}</div>`:""; }
function cn(m){ if(/Invalid login/.test(m))return "帳號或密碼不對"; if(/already registered/.test(m))return "這個帳號已存在，請直接登入"; return m; }
$("au-login").onclick=async()=>{ const email=$("au-email").value.trim(),pass=$("au-pass").value;
  if(!email||!pass){authMsg("err","請輸入帳號和密碼。");return;} authMsg("","");
  const {error}=await sb.auth.signInWithPassword({email,password:pass}); if(error) authMsg("err","登入失敗："+cn(error.message)); };
$("au-signup").onclick=async()=>{ const email=$("au-email").value.trim(),pass=$("au-pass").value;
  if(!email||pass.length<6){authMsg("err","建立帳號需要一個電子郵件，密碼至少 6 個字。");return;} authMsg("","");
  const {data,error}=await sb.auth.signUp({email,password:pass}); if(error){authMsg("err","建立失敗："+cn(error.message));return;}
  if(data.session) authMsg("ok","帳號建立成功，登入中…"); else authMsg("ok","帳號已建立。若開了信箱驗證請去收信；想省略可在 Supabase 用 Add user 並勾 Auto Confirm。"); };

async function enterApp(){
  $("view-auth").classList.add("hidden"); $("view-main").classList.remove("hidden"); $("nav").classList.remove("hidden");
  await loadSettings(); await loadToday();
  const {data:{user}}=await sb.auth.getUser();
  $("me-email").textContent=user?.email||""; $("me-name").value=settings.display_name||""; $("me-reward").value=settings.reward_msg||"";
  renderCourseSelect(); renderRestDays(); renderUnits(); await renderToday(); switchTab("today");
}
async function loadSettings(){
  const {data}=await sb.from("settings").select("*").maybeSingle();
  if(data){ settings={display_name:data.display_name||"",course_id:data.course_id||"",reward_msg:data.reward_msg||"",selected_units:data.selected_units||[],daily_goals:data.daily_goals||{},rest_days:data.rest_days||[]}; }
  else { await sb.from("settings").insert({}); settings={display_name:"",course_id:"",reward_msg:"",selected_units:[],daily_goals:{},rest_days:[]}; }
}
async function saveSettings(){
  await sb.from("settings").upsert({display_name:settings.display_name,course_id:settings.course_id,reward_msg:settings.reward_msg,selected_units:settings.selected_units,daily_goals:settings.daily_goals,rest_days:settings.rest_days,updated_at:new Date().toISOString()});
}
async function loadToday(){ todayAct={}; const {data}=await sb.from("activity").select("*").eq("day",todayStr()); (data||[]).forEach(r=> todayAct[r.unit_id]={done:r.done,correct:r.correct}); }

function dayComplete(actMap){ const en=enabledUnits(); if(en.length===0) return {full:false,met:0,total:0};
  let met=0; en.forEach(u=>{ const c=cfg(u),a=actMap[u],v=c.mode==="correct"?(a?.correct||0):(a?.done||0); if(a&&v>=c.target) met++; });
  return {full:met===en.length,met,total:en.length}; }

/* 今日 */
async function renderToday(){
  const now=new Date();
  $("td-day").textContent=now.getDate(); $("td-my").textContent=`${now.getFullYear()}·${now.getMonth()+1}月`; $("td-wd").textContent="星期"+WD[now.getDay()];
  $("who").textContent=settings.display_name?("嗨，"+settings.display_name):"";
  $("rest-slot").innerHTML = isRestDay(now) ? `<div class="rest-banner">😌 今天是休息日，好好放鬆。想練習也可以，都算加分。</div>` : "";

  const en=orderUnits(enabledUnits()), box=$("today-tasks");
  if(en.length===0){ box.innerHTML=`<div class="empty">還沒有設定任務。<br>到下方 <b>單元</b> 打開想練的單元、設好每天題數，這裡就會出現。</div>`; $("reward-slot").innerHTML=""; await refreshStreak(); return; }
  box.innerHTML=en.map(uid=>{ const u=unit(uid),c=cfg(uid),done=val(uid,todayAct[uid]||{}),pct=c.target?Math.min(100,Math.round(done/c.target*100)):0,fin=c.target&&done>=c.target,mt=c.mode==="correct"?"答對":"做";
    return `<div class="task"><div class="info"><div class="t-name">${u.title}</div><div class="t-sub">${u.tag||u.subject||""} · 難度${lvName(c.level)}</div>
      <div class="bar"><i style="width:${pct}%"></i></div><div class="cnt">${mt} ${done} / ${c.target} 題${fin?" · 完成":""}</div></div>
      ${fin?`<div style="display:flex;flex-direction:column;align-items:center;gap:8px;"><div class="seal-done">優</div><button class="start" style="padding:7px 12px;font-size:13px;" onclick="play('${uid}')">再練習</button></div>`:`<button class="start" onclick="play('${uid}')">開始</button>`}</div>`; }).join("");
  const dc=dayComplete(todayAct);
  if(dc.full){ const msg=settings.reward_msg||"今天的任務全部完成了！"; $("reward-slot").innerHTML=`<div class="reward"><div class="seal-done">優</div><div class="r-txt"><b>全部完成 🎉</b><br>${escapeHtml(msg)}</div></div>`; }
  else $("reward-slot").innerHTML="";
  await refreshStreak();
}
function lvName(l){ return l==="basic"?"基礎":l==="adv"?"進階":"混合"; }

async function refreshStreak(){
  const en=enabledUnits(), chip=$("streak-chip"); if(en.length===0){ chip.classList.add("hidden"); return; }
  const from=new Date(); from.setDate(from.getDate()-60);
  const {data}=await sb.from("activity").select("*").gte("day",fmtDate(from));
  const byDay={}; (data||[]).forEach(r=>{ (byDay[r.day]=byDay[r.day]||{})[r.unit_id]={done:r.done,correct:r.correct}; });
  let streak=0, d=new Date();
  for(let i=0;i<60;i++){ const ds=fmtDate(d);
    if(isRestDay(d)){ d.setDate(d.getDate()-1); continue; }
    const complete=dayComplete(byDay[ds]||{}).full;
    if(ds===todayStr() && !complete){ d.setDate(d.getDate()-1); continue; }
    if(complete){ streak++; d.setDate(d.getDate()-1); } else break; }
  if(streak>0){ chip.classList.remove("hidden"); chip.innerHTML=`🔥 連續達標 <span class="n">${streak}</span> 天`; } else chip.classList.add("hidden");
}

/* 練習 */
function play(uid,practiceMode){ const u=unit(uid); if(!u.ready) return; playUnit=uid; playPractice=!!practiceMode; playLevel=cfg(uid).level||"mix";
  $("view-main").classList.add("hidden"); $("nav").classList.add("hidden"); $("view-play").classList.remove("hidden");
  $("play-title").textContent=u.title+(practiceMode?"（自由練習）":""); updateLive(); $("play-frame").src=u.file+"?level="+playLevel; }
function practice(uid){ play(uid,true); }
function updateLive(){ const c=cfg(playUnit),done=val(playUnit,todayAct[playUnit]||{}),t=c.mode==="correct"?"答對":"做";
  $("play-live").textContent = playPractice ? `自由練習 · 今日已${t} ${done}` : `今日${t} ${done}${c.target?" / "+c.target:""}`; }
$("play-back").onclick=async()=>{ $("play-frame").src="about:blank"; $("view-play").classList.add("hidden"); $("view-main").classList.remove("hidden"); $("nav").classList.remove("hidden"); await renderToday(); if(!$("tab-wrong").classList.contains("hidden")) await loadMistakes(); };
window.addEventListener("message",async ev=>{ const d=ev.data; if(!d||!playUnit) return;
  if(d.type==="unit-progress"){ const inc=d.unitDone||0,cor=d.unitCorrect||0,cur=todayAct[playUnit]||{done:0,correct:0}; cur.done+=inc; cur.correct+=cor; todayAct[playUnit]=cur; updateLive();
    try{ const {error}=await sb.rpc("log_activity",{p_day:todayStr(),p_unit:playUnit,p_done:inc,p_correct:cor}); if(error) console.warn("[log_activity] 記錄失敗：",error.message); }catch(e){ console.warn("[log_activity] 例外：",e.message); } }
  else if(d.type==="unit-mistake"){ try{ const {error}=await sb.rpc("log_mistake",{p_unit:playUnit,p_q:d.q||"",p_ans:d.ans||"",p_given:d.given||"",p_explain:d.steps||"",p_tip:d.tip||""}); if(error) console.warn("[log_mistake] 記錄失敗：",error.message,"（很可能是 Supabase 沒建 mistakes 資料表或 log_mistake 函式，或函式還是舊版沒有 p_explain 參數）"); }catch(e){ console.warn("[log_mistake] 例外：",e.message); } }
});

/* 月曆 */
async function renderCal(){
  $("cal-dow").innerHTML=WD.map(w=>`<div class="dow">${w}</div>`).join("");
  const y=calMonth.getFullYear(),m=calMonth.getMonth(); $("cal-title").textContent=`${y} 年 ${m+1} 月`;
  const days=new Date(y,m+1,0).getDate(),lead=new Date(y,m,1).getDay();
  const from=fmtDate(new Date(y,m,1)),to=fmtDate(new Date(y,m,days));
  const {data}=await sb.from("activity").select("*").gte("day",from).lte("day",to);
  const byDay={}; (data||[]).forEach(r=>{ (byDay[r.day]=byDay[r.day]||{})[r.unit_id]={done:r.done,correct:r.correct}; });
  let html=""; for(let i=0;i<lead;i++) html+=`<div class="cell pad"></div>`;
  for(let dn=1;dn<=days;dn++){ const dateObj=new Date(y,m,dn),ds=fmtDate(dateObj),am=byDay[ds]||{},has=Object.keys(am).length>0,rest=isRestDay(dateObj);
    const dc=dayComplete(am),full=dc.full,partial=!full&&!rest&&(dc.met>0||has);
    html+=`<div class="cell ${has?'has':''} ${full?'num-dim':''} ${rest?'rest':''} ${ds===todayStr()?'today':''} ${partial?'partial':''}" ${has?`onclick="dayDetail('${ds}')"`:""}>${full?`<span class="stamp">優</span>`:""}<span>${dn}</span></div>`; }
  $("cal-grid").innerHTML=html;
}
async function dayDetail(ds){ const {data}=await sb.from("activity").select("*").eq("day",ds),rows=data||[];
  const list=rows.length?rows.map(r=>`<div class="s-row"><span>${unit(r.unit_id).title}</span><span class="n">做 ${r.done} · 對 ${r.correct}</span></div>`).join(""):`<div class="empty">這天沒有紀錄</div>`;
  const [,m,d]=ds.split("-");
  $("sheet-root").innerHTML=`<div class="sheet-bg" onclick="closeSheet(event)"><div class="sheet" onclick="event.stopPropagation()"><h3>${Number(m)}月${Number(d)}日 做了什麼</h3><div class="s-date">${ds}</div>${list}<button class="close" onclick="closeSheet()">關閉</button></div></div>`;
}
function closeSheet(e){ if(e&&e.target.closest(".sheet"))return; $("sheet-root").innerHTML=""; }
$("cal-prev").onclick=()=>{calMonth.setMonth(calMonth.getMonth()-1);renderCal();};
$("cal-next").onclick=()=>{calMonth.setMonth(calMonth.getMonth()+1);renderCal();};

/* 錯題本 */
async function loadMistakes(){ const {data}=await sb.from("mistakes").select("*"); MISTAKES=(data||[]).sort((a,b)=> a.unit_id<b.unit_id?-1:a.unit_id>b.unit_id?1:0); renderMistakes(); }
function renderMistakes(){
  const box=$("mistake-list");
  if(MISTAKES.filter(Boolean).length===0){ box.innerHTML=`<div class="card"><div class="empty">目前沒有錯題，太棒了！<br>之後練習答錯的題目會自動收在這裡。</div></div>`; return; }
  let html="",lastU=null;
  MISTAKES.forEach((r,i)=>{ if(!r) return; if(r.unit_id!==lastU){ html+=`<div class="mk-unit" data-grp="${r.unit_id}" style="display:flex;align-items:center;justify-content:space-between;gap:10px;"><span>${unit(r.unit_id).title}</span>${unit(r.unit_id).ready?`<button class="start" style="padding:6px 12px;font-size:12px;" onclick="practice('${r.unit_id}')">去練這單元</button>`:``}</div>`; lastU=r.unit_id; }
    html+=`<div class="mk" id="mk-${i}" data-uid="${r.unit_id}"><div class="q">${escapeHtml(r.question)}</div>
      <div class="meta">你的答案：${escapeHtml(r.given||"—")} · 錯 ${r.count} 次</div>
      <div class="ans">正確答案：${escapeHtml(r.answer)}</div>
      ${r.explain?`<div class="detail"><div class="detail-label">詳解</div><div class="steps">${r.explain}</div>${r.tip?`<div class="d-tip">${escapeHtml(r.tip)}</div>`:``}</div>`:``}
      <div class="recheck"><input id="mkin-${i}" inputmode="text" autocomplete="off" placeholder="再算一次，把答案打出來" onkeydown="if(event.key==='Enter')mkCheck(${i})"><button onclick="mkCheck(${i})">確認</button><span class="r" id="mkres-${i}"></span></div>
      <div class="acts"><button class="reveal-btn" onclick="mkReveal(${i})">看答案</button><button class="done-btn" id="mkdone-${i}" disabled onclick="mkDone(${i})">訂正完成</button></div></div>`; });
  box.innerHTML=html;
}
function mkReveal(i){ const el=$("mk-"+i); if(el) el.classList.toggle("reveal"); }
function mkNorm(s){ return (s||"").replace(/[−–—]/g,"-").replace(/\s+/g,"").toLowerCase(); }
function mkCheck(i){ const r=MISTAKES[i]; if(!r) return; const inp=$("mkin-"+i),res=$("mkres-"+i),done=$("mkdone-"+i);
  const v=mkNorm(inp.value);
  if(v===""){ res.textContent="先算出答案再打進來"; res.className="r no"; return; }
  if(v===mkNorm(r.answer)){ res.textContent="✓ 答對了，這題你會了！"; res.className="r ok"; inp.disabled=true; done.disabled=false; done.textContent="訂正完成 ✓"; }
  else { res.textContent="還不對，再想想，或先看答案～"; res.className="r no"; }
}
async function mkDone(i){ const r=MISTAKES[i]; if(!r) return; const btn=$("mkdone-"+i); if(btn&&btn.disabled) return;
  const {error}=await sb.from("mistakes").delete().eq("unit_id",r.unit_id).eq("question",r.question);
  if(error){ console.warn("[mistakes.delete] 失敗：",error.message); return; }
  const uid=r.unit_id; MISTAKES[i]=null;              // 只移除這一張，不整個重畫（保住其他卡片已填的答案）
  const card=$("mk-"+i); if(card) card.remove();
  const box=$("mistake-list");
  if(!box.querySelector('.mk[data-uid="'+uid+'"]')){ const h=box.querySelector('[data-grp="'+uid+'"]'); if(h) h.remove(); } // 該單元最後一題也訂正完 → 收掉標題
  if(!box.querySelector('.mk')){ MISTAKES=[]; renderMistakes(); }   // 全部訂正完 → 顯示空狀態
}

/* 單元 / 版本 */
function currentCourse(){ return COURSES.find(c=>c.id===settings.course_id); }
function orderUnits(ids){ const c=currentCourse(); if(!c||!c.sequence.length) return ids.slice(); const seq=c.sequence;
  return ids.slice().sort((a,b)=>{ const ia=seq.indexOf(a),ib=seq.indexOf(b); return (ia<0?999:ia)-(ib<0?999:ib); }); }
function orderedPool(){ const c=currentCourse(); if(!c||!c.sequence.length) return UNITS.slice();
  const inSeq=c.sequence.map(id=>UNITS.find(u=>u.id===id)).filter(Boolean); const rest=UNITS.filter(u=>!c.sequence.includes(u.id)); return inSeq.concat(rest); }
function renderCourseSelect(){ $("course-select").innerHTML=COURSES.map(c=>`<option value="${c.id}" ${c.id===settings.course_id?"selected":""}>${c.title}</option>`).join(""); }
$("course-select").onchange=async e=>{ settings.course_id=e.target.value; await saveSettings(); renderUnits(); await renderToday(); };

function subjMeta(id){ return SUBJECTS.find(s=>s.id===id)||{id,icon:"📚",color:"#8a857b"}; }
function toggleSubj(id){ collapsedSubj[id]=!collapsedSubj[id]; renderUnits(); }
function unitRow(u){ const on=settings.selected_units.includes(u.id),c=cfg(u.id);
  if(!u.ready){ return `<div class="unit"><div class="unit-head"><div class="toggle off-disabled"><i></i></div><div class="u-info"><div class="u-name">${u.title}</div><div class="u-sub">${u.tag||""}</div></div><span class="badge">準備中</span></div></div>`; }
  return `<div class="unit"><div class="unit-head"><div class="toggle ${on?'on':''}" onclick="toggleUnit('${u.id}')"><i></i></div><div class="u-info"><div class="u-name">${u.title}</div><div class="u-sub">${u.tag||u.subject||""} ${u.grade||""}</div></div><button class="start" style="padding:8px 14px;font-size:13px;" onclick="practice('${u.id}')">練習</button></div>
    ${on?`<div class="cfg">
      <div class="cfg-row"><span class="lbl">每天目標</span><input class="goal-in num" type="number" min="1" value="${c.target}" onchange="setGoal('${u.id}',this.value)"></div>
      <div class="cfg-row"><span class="lbl">計算方式</span><div class="seg"><button class="${c.mode==='attempts'?'on':''}" onclick="setMode('${u.id}','attempts')">做題數</button><button class="${c.mode==='correct'?'on':''}" onclick="setMode('${u.id}','correct')">答對數</button></div></div>
      <div class="cfg-row"><span class="lbl">難度</span><div class="seg"><button class="${c.level==='basic'?'on':''}" onclick="setLevel('${u.id}','basic')">基礎</button><button class="${c.level==='adv'?'on':''}" onclick="setLevel('${u.id}','adv')">進階</button><button class="${c.level==='mix'?'on':''}" onclick="setLevel('${u.id}','mix')">混合</button></div></div>
    </div>`:``}</div>`;
}
function renderUnits(){
  const box=$("unit-list"); if(UNITS.length===0){ box.innerHTML=`<div class="card"><div class="empty">找不到單元清單（units.json）。</div></div>`; return; }
  const order=[], groups={};
  orderedPool().forEach(u=>{ const s=u.subject||"其他"; if(!groups[s]){ groups[s]=[]; order.push(s); } groups[s].push(u); });
  box.innerHTML=order.map(s=>{ const m=subjMeta(s), list=groups[s], open=!collapsedSubj[s];
    const total=list.length, onCnt=list.filter(u=>settings.selected_units.includes(u.id)).length, prep=list.filter(u=>!u.ready).length;
    const meta=`共 <span class="n">${total}</span> 單元`+(onCnt?`<span class="subj-dot" style="background:${m.color}"></span>${onCnt} 個排了任務`:``)+(prep?`<span class="subj-dot" style="background:${m.color}"></span>${prep} 個準備中`:``);
    return `<div class="subj ${open?'open':''}">
      <div class="subj-head" onclick="toggleSubj('${s}')">
        <div class="subj-ic" style="background:${m.color}1a;color:${m.color}">${m.icon}</div>
        <div class="subj-tt"><div class="nm">${s}</div><div class="mt">${meta}</div></div>
        <div class="subj-chev">▼</div>
      </div>
      <div class="subj-body">${list.map(unitRow).join("")}</div>
    </div>`; }).join("");
}
async function toggleUnit(uid){ const i=settings.selected_units.indexOf(uid);
  if(i>=0){ settings.selected_units.splice(i,1); delete settings.daily_goals[uid]; }
  else { settings.selected_units.push(uid); if(settings.daily_goals[uid]==null) settings.daily_goals[uid]={target:10,mode:"attempts",level:"mix"}; }
  await saveSettings(); renderUnits(); await renderToday(); }
function writeCfg(uid,patch){ settings.daily_goals[uid]={...cfg(uid),...patch}; }
async function setGoal(uid,v){ writeCfg(uid,{target:Math.max(1,parseInt(v)||1)}); await saveSettings(); await renderToday(); }
async function setMode(uid,mode){ writeCfg(uid,{mode}); await saveSettings(); renderUnits(); await renderToday(); }
async function setLevel(uid,level){ writeCfg(uid,{level}); await saveSettings(); renderUnits(); await renderToday(); }

/* 我 / 休息日 */
function renderRestDays(){ $("restdays").innerHTML=WD.map((w,i)=>`<div class="rd ${(settings.rest_days||[]).includes(i)?'on':''}" onclick="toggleRest(${i})">${w}</div>`).join(""); }
async function toggleRest(i){ const arr=settings.rest_days||[]; const p=arr.indexOf(i); if(p>=0) arr.splice(p,1); else arr.push(i); settings.rest_days=arr; await saveSettings(); renderRestDays(); await renderToday(); }
$("me-save").onclick=async()=>{ settings.display_name=$("me-name").value.trim(); settings.reward_msg=$("me-reward").value.trim(); await saveSettings(); await renderToday(); $("me-save").textContent="已儲存"; setTimeout(()=>$("me-save").textContent="儲存",1200); };
$("me-logout").onclick=async()=>{ await sb.auth.signOut(); };

/* 分頁 */
function switchTab(tab){ ["today","cal","wrong","units","me"].forEach(t=>$("tab-"+t).classList.toggle("hidden",t!==tab));
  document.querySelectorAll(".nav button").forEach(b=>b.classList.toggle("on",b.dataset.tab===tab));
  if(tab==="cal") renderCal(); if(tab==="wrong") loadMistakes(); }
document.querySelectorAll(".nav button").forEach(b=> b.onclick=()=>switchTab(b.dataset.tab));

boot();
</script>
