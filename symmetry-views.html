<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>線對稱與三視圖 練習</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@400;500;600;700&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#1b1d26;
    --ink-soft:#5b606f;
    --pos:#2563eb;      /* 正號：藍 */
    --neg:#ea580c;      /* 負號：橘 */
    --right:#16a34a;    /* 答對：綠 */
    --wrong:#e11d48;    /* 答錯：紅 */
    --line:#e6e8ef;
    --card:#ffffff;
    --key:#f3f5f9;
    --key-press:#e3e7f0;
    --bg:#f7f8fb;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;height:100%;}
  body{
    font-family:'Noto Sans TC',system-ui,-apple-system,sans-serif;
    color:var(--ink);
    background:
      linear-gradient(var(--line) 1px,transparent 1px) 0 0/28px 28px,
      linear-gradient(90deg,var(--line) 1px,transparent 1px) 0 0/28px 28px,
      var(--bg);
    display:flex;justify-content:center;
    padding:14px;
  }
  .wrap{width:100%;max-width:440px;display:flex;flex-direction:column;gap:14px;}

  header{display:flex;align-items:baseline;justify-content:space-between;padding:2px 2px 0;}
  header h1{font-size:19px;font-weight:700;margin:0;letter-spacing:.5px;}
  header .sub{font-size:12px;color:var(--ink-soft);}
  .streak{font-family:'Lexend',sans-serif;font-size:13px;color:var(--ink-soft);}
  .streak b{color:var(--ink);font-weight:600;}

  .levels{display:flex;gap:8px;}
  .lv{flex:1;border:none;border-radius:12px;padding:10px 0;font-family:inherit;font-size:14px;
      font-weight:500;background:var(--card);color:var(--ink-soft);border:1.5px solid var(--line);
      cursor:pointer;transition:.15s;}
  .lv.active{background:var(--ink);color:#fff;border-color:var(--ink);}

  .card{background:var(--card);border:1.5px solid var(--line);border-radius:20px;
        padding:26px 18px;box-shadow:0 8px 24px -18px rgba(20,25,50,.35);}

  .eq{font-family:'Lexend','Noto Sans TC',sans-serif;font-variant-numeric:tabular-nums;
      text-align:center;font-size:30px;font-weight:500;line-height:1.35;letter-spacing:.5px;
      word-spacing:2px;min-height:44px;}
  .eq .pos{color:var(--pos);font-weight:600;}
  .eq .neg{color:var(--neg);font-weight:600;}
  .eq .op{color:var(--ink);margin:0 2px;}
  .eq .q{color:var(--ink-soft);}

  .ans{margin-top:18px;height:56px;border-radius:14px;border:2px solid var(--line);
       display:flex;align-items:center;justify-content:center;
       font-family:'Lexend',sans-serif;font-size:28px;font-variant-numeric:tabular-nums;
       transition:.15s;background:#fbfcfe;}
  .ans.empty{color:#b7bccb;}
  .ans.ok{border-color:var(--right);color:var(--right);background:#f0fdf4;}
  .ans.no{border-color:var(--wrong);color:var(--wrong);background:#fff1f4;}
  @keyframes shake{10%,90%{transform:translateX(-1px)}30%,70%{transform:translateX(4px)}50%{transform:translateX(-6px)}}
  .shake{animation:shake .35s;}

  /* 解釋 */
  .explain{margin-top:16px;border-top:1.5px dashed var(--line);padding-top:16px;display:none;}
  .explain.show{display:block;}
  .steps{font-family:'Lexend','Noto Sans TC',sans-serif;font-variant-numeric:tabular-nums;
         font-size:17px;line-height:2;color:var(--ink);}
  .steps .lead{color:var(--ink-soft);font-family:'Noto Sans TC';font-size:13px;margin-right:6px;}
  .steps .pos{color:var(--pos);font-weight:600;}
  .steps .neg{color:var(--neg);font-weight:600;}
  .steps .res{color:var(--right);font-weight:700;}
  .tip{margin-top:10px;font-size:13px;color:var(--ink-soft);background:#f4f6fb;
       border-radius:10px;padding:9px 12px;line-height:1.6;}
  svg{width:100%;height:auto;margin-top:6px;display:block;}

  /* 鍵盤 */
  .pad{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;}
  .key{border:none;border-radius:14px;background:var(--key);color:var(--ink);
       font-family:'Lexend',sans-serif;font-size:24px;font-weight:500;
       height:58px;cursor:pointer;transition:.08s;user-select:none;}
  .key:active{background:var(--key-press);transform:scale(.96);}
  .key.sign{color:var(--neg);font-weight:600;}
  .key.del{color:var(--ink-soft);font-size:22px;}

  .go{border:none;border-radius:16px;height:58px;width:100%;
      font-family:inherit;font-size:18px;font-weight:700;letter-spacing:1px;
      background:var(--ink);color:#fff;cursor:pointer;transition:.12s;}
  .go:active{transform:scale(.98);}
  .go.next{background:var(--pos);}
  .go:disabled{opacity:.4;}
</style>

<body>
<div class="wrap">

  <header>
    <div>
      <h1>線對稱與三視圖</h1>
      <div class="sub">座標對稱 · 對稱軸 · 三視圖</div>
    </div>
    <div class="streak">連對 <b id="streak">0</b></div>
  </header>

  <div class="levels">
    <button class="lv active" data-lv="basic">基礎</button>
    <button class="lv" data-lv="adv">進階</button>
    <button class="lv" data-lv="mix">混合</button>
  </div>

  <div class="card">
    <div class="eq" id="eq"></div>
    <div class="ans empty" id="ans">?</div>

    <div class="explain" id="explain">
      <div class="steps" id="steps"></div>
      <div id="numline"></div>
      <div class="tip" id="tip"></div>
    </div>
  </div>

  <div class="pad" id="pad">
    <button class="key" data-k="7">7</button>
    <button class="key" data-k="8">8</button>
    <button class="key" data-k="9">9</button>
    <button class="key" data-k="4">4</button>
    <button class="key" data-k="5">5</button>
    <button class="key" data-k="6">6</button>
    <button class="key" data-k="1">1</button>
    <button class="key" data-k="2">2</button>
    <button class="key" data-k="3">3</button>
    <button class="key sign" data-k="sign">±</button>
    <button class="key" data-k="0">0</button>
    <button class="key del" data-k="del">⌫</button>
  </div>

  <button class="go" id="go">檢查</button>
</div>

<script>
/* ===== gen-start ===== */
const rand=(a,b)=>Math.floor(Math.random()*(b-a+1))+a;
const nz=(lo,hi)=>{ const v=rand(lo,hi); return Math.random()<0.5?-v:v; };
const pick=a=>a[rand(0,a.length-1)];

// 對稱軸數量對照（審定）：type 供繪圖用
const SHAPES=[
  {name:'正三角形',axes:3,type:'reg',n:3},
  {name:'正方形',axes:4,type:'reg',n:4},
  {name:'正五邊形',axes:5,type:'reg',n:5},
  {name:'正六邊形',axes:6,type:'reg',n:6},
  {name:'長方形',axes:2,type:'rect'},
  {name:'等腰三角形',axes:1,type:'isoTri'},
  {name:'平行四邊形',axes:0,type:'para'},
  {name:'菱形',axes:2,type:'rhombus'},
];

function genReflect(){                    // 座標對稱：對 x軸 或 y軸
  const axis = Math.random()<0.5?'x-axis':'y-axis';
  const x=nz(1,9), y=nz(1,9);
  const rx = axis==='y-axis' ? -x : x;    // 對 y軸：x 變號
  const ry = axis==='x-axis' ? -y : y;    // 對 x軸：y 變號
  const ask = Math.random()<0.5?'x':'y';
  return {kind:'reflect',axis,x,y,rx,ry,ask,answer: ask==='x'?rx:ry};
}
function genAxes(){ const s=pick(SHAPES); return {kind:'axes',shape:s,answer:s.axes}; }

function computeView(h,view){             // 由高度圖算某視圖的方格數
  const R=h.length, C=h[0].length;
  if(view==='top'){ let n=0; for(let r=0;r<R;r++)for(let c=0;c<C;c++) if(h[r][c]>0) n++; return n; }
  if(view==='front'){ let s=0; for(let c=0;c<C;c++){ let m=0; for(let r=0;r<R;r++) m=Math.max(m,h[r][c]); s+=m; } return s; }
  let s=0; for(let r=0;r<R;r++){ let m=0; for(let c=0;c<C;c++) m=Math.max(m,h[r][c]); s+=m; } return s; // side
}
function genBlocks(){                      // 積木三視圖（2×2 底、高 0~3）
  const R=2,C=2; let h,occ,tot;
  do{ h=[]; occ=0; tot=0;
    for(let r=0;r<R;r++){ h.push([]); for(let c=0;c<C;c++){ const v=rand(0,3); h[r].push(v); if(v>0)occ++; tot+=v; } }
  }while(occ<2 || tot<3 || tot>10);
  const view=pick(['front','side','top']);
  return {kind:'blocks',h,R,C,view,answer:computeView(h,view)};
}

function makeProblem(lv){
  if(lv==='basic') return genReflect();
  if(lv==='adv') return genAxes();
  const r=Math.random();
  return r<0.25?genReflect():r<0.5?genAxes():genBlocks();
}
/* ===== gen-end ===== */

let level='basic', problem=null, entry='', answered=false, streak=0;

const VN={front:'正面',side:'側面',top:'上面'};
function qText(){ const p=problem;
  if(p.kind==='reflect') return `A(${p.x}, ${p.y}) 對 ${p.axis==='x-axis'?'x':'y'}軸對稱，新點的 ${p.ask} 座標 =`;
  if(p.kind==='axes') return `${p.shape.name} 有幾條對稱軸？`;
  return `積木堆（高度 ${JSON.stringify(p.h)}）從${VN[p.view]}看有幾個小方格 =`;
}

/* ---------- SVG 繪圖 ---------- */
function svgReflect(p){                    // 座標平面 + 原始點 + 對稱軸
  const s=9, R=90; let g='';
  for(let i=-9;i<=9;i++){ const t=i*s;
    g+=`<line x1="${-R}" y1="${t}" x2="${R}" y2="${t}" stroke="#eef1f7" stroke-width="1"/>`;
    g+=`<line x1="${t}" y1="${-R}" x2="${t}" y2="${R}" stroke="#eef1f7" stroke-width="1"/>`;
  }
  const xax=`<line x1="${-R}" y1="0" x2="${R}" y2="0" stroke="#b7bccb" stroke-width="1.5"/>`;
  const yax=`<line x1="0" y1="${-R}" x2="0" y2="${R}" stroke="#b7bccb" stroke-width="1.5"/>`;
  const hi = p.axis==='x-axis'
    ? `<line x1="${-R}" y1="0" x2="${R}" y2="0" stroke="var(--neg)" stroke-width="3"/>`
    : `<line x1="0" y1="${-R}" x2="0" y2="${R}" stroke="var(--neg)" stroke-width="3"/>`;
  const px=p.x*s, py=-p.y*s;
  const dot=`<circle cx="${px}" cy="${py}" r="5" fill="var(--pos)"/>`+
    `<text x="${px+(p.x<0?-6:6)}" y="${py+(p.y<0?16:-9)}" fill="var(--pos)" font-size="13" font-family="Lexend" text-anchor="${p.x<0?'end':'start'}">A(${p.x}, ${p.y})</text>`;
  return `<svg viewBox="-100 -100 200 200">${g}${xax}${yax}${hi}${dot}</svg>`;
}
function regPoly(n,rr,rot){ let pts=[]; for(let i=0;i<n;i++){ const a=rot+i*2*Math.PI/n; pts.push([rr*Math.cos(a),rr*Math.sin(a)]); } return pts; }
function svgShape(sh){ let pts;
  if(sh.type==='reg') pts=regPoly(sh.n,42, sh.n===4?Math.PI/4:-Math.PI/2);
  else if(sh.type==='rect') pts=[[-48,-30],[48,-30],[48,30],[-48,30]];
  else if(sh.type==='isoTri') pts=[[0,-36],[42,32],[-42,32]];
  else if(sh.type==='para') pts=[[-54,-26],[30,-26],[54,26],[-30,26]];
  else pts=[[0,-40],[32,0],[0,40],[-32,0]]; // rhombus
  const d=pts.map(p=>p.map(v=>v.toFixed(1)).join(',')).join(' ');
  return `<svg viewBox="-72 -56 144 112"><polygon points="${d}" style="fill:#dbe6ff;stroke:var(--pos);stroke-width:2.5;stroke-linejoin:round"/></svg>`;
}
function svgBlocks(h){                     // 等角視圖（painter：depth=r+c 由小到大、由下往上）
  const R=h.length,C=h[0].length, W=24,Hh=12,ch=28;
  const proj=(X,Y,Z)=>[(X-Y)*W,(X+Y)*Hh-Z*ch];
  const cubes=[]; for(let r=0;r<R;r++)for(let c=0;c<C;c++)for(let k=0;k<h[r][c];k++) cubes.push({r,c,k});
  cubes.sort((a,b)=>(a.r+a.c)-(b.r+b.c)||a.k-b.k);
  let poly='', minX=1e9,minY=1e9,maxX=-1e9,maxY=-1e9;
  const push=(P,fill)=>{ const d=P.map(q=>{ minX=Math.min(minX,q[0]);maxX=Math.max(maxX,q[0]);
    minY=Math.min(minY,q[1]);maxY=Math.max(maxY,q[1]); return q[0].toFixed(1)+','+q[1].toFixed(1); }).join(' ');
    poly+=`<polygon points="${d}" style="fill:${fill};stroke:#1b1d26;stroke-width:1.4;stroke-linejoin:round"/>`; };
  for(const {r,c,k} of cubes){ const X=c,Y=r,Z=k;
    push([proj(X,Y,Z),proj(X+1,Y,Z),proj(X+1,Y,Z+1),proj(X,Y,Z+1)],'#9db8ee');            // front
    push([proj(X+1,Y,Z),proj(X+1,Y+1,Z),proj(X+1,Y+1,Z+1),proj(X+1,Y,Z+1)],'#6f93de');    // right
    push([proj(X,Y,Z+1),proj(X+1,Y,Z+1),proj(X+1,Y+1,Z+1),proj(X,Y+1,Z+1)],'#e7eefc');    // top
  }
  const pad=8, vb=`${(minX-pad).toFixed(1)} ${(minY-pad).toFixed(1)} ${(maxX-minX+2*pad).toFixed(1)} ${(maxY-minY+2*pad).toFixed(1)}`;
  return `<svg viewBox="${vb}">${poly}</svg>`;
}

function figHTML(){ const p=problem;
  if(p.kind==='reflect'){
    return `<div style="max-width:190px;margin:2px auto 8px;">${svgReflect(p)}</div>`+
      `<div style="font-size:16px;font-family:'Noto Sans TC';">A(${p.x}, ${p.y}) 對 <b style="color:var(--neg)">${p.axis==='x-axis'?'x 軸':'y 軸'}</b> 對稱，<br>新點的 <b>${p.ask}</b> 座標 = <span class="q">?</span></div>`;
  }
  if(p.kind==='axes'){
    return `<div style="max-width:160px;margin:2px auto 8px;">${svgShape(p.shape)}</div>`+
      `<div style="font-size:16px;font-family:'Noto Sans TC';">這個圖形有幾條對稱軸？ <span class="q">?</span></div>`;
  }
  return `<div style="max-width:190px;margin:2px auto 8px;">${svgBlocks(p.h)}</div>`+
    `<div style="font-size:16px;font-family:'Noto Sans TC';">從 <b style="color:var(--neg)">${VN[p.view]}</b> 看，有幾個小方格？ <span class="q">?</span></div>`;
}

function render(){
  document.getElementById('eq').innerHTML=figHTML();
  entry=''; answered=false;
  const ans=document.getElementById('ans'); ans.textContent='?'; ans.className='ans empty';
  document.getElementById('explain').className='explain';
  const go=document.getElementById('go'); go.textContent='檢查'; go.className='go'; go.disabled=false;
}
function showEntry(){ const ans=document.getElementById('ans');
  if(entry===''||entry==='-'){ ans.textContent = entry==='-'?'−':'?'; ans.className='ans empty'; return; }
  ans.textContent=entry.replace('-','−'); ans.className='ans';
}

const fmt=n=> n<0 ? `<span class="neg">−${Math.abs(n)}</span>` : `<span class="pos">${n}</span>`;
const AXTXT={'正三角形':'3 條（每個頂點連到對邊中點）','正方形':'4 條（水平、垂直、2 條對角線）',
  '正五邊形':'5 條','正六邊形':'6 條','長方形':'2 條（水平、垂直中線；對角線不算！）',
  '等腰三角形':'1 條（頂角的角平分線）','平行四邊形':'0 條（只有點對稱，沒有線對稱）','菱形':'2 條（兩條對角線）'};
function buildSteps(){ const p=problem;
  if(p.kind==='reflect'){
    const axname=p.axis==='x-axis'?'x 軸':'y 軸';
    const rule=p.axis==='x-axis'?'y 座標變號、x 座標不變':'x 座標變號、y 座標不變';
    return `<div><span class="lead">對稱軸</span>對 ${axname} 對稱</div>`+
      `<div><span class="lead">規則</span>${rule}</div>`+
      `<div>A(${p.x}, ${p.y}) → (${fmt(p.rx)}, ${fmt(p.ry)})</div>`+
      `<div>新點的 ${p.ask} 座標 = <span class="res">${fmt(p.answer)}</span></div>`;
  }
  if(p.kind==='axes'){
    return `<div><span class="lead">圖形</span>${p.shape.name}</div>`+
      `<div><span class="lead">對稱軸</span>${AXTXT[p.shape.name]}</div>`+
      `<div>共 <span class="res">${p.answer}</span> 條</div>`;
  }
  const h=p.h;
  let out=`<div><span class="lead">口訣</span>${VN[p.view]}看＝把該方向「疊最高」的那一排算進去</div>`;
  if(p.view==='top'){
    out+=`<div><span class="lead">上面</span>從上往下，數有積木的格子數</div>`;
    let n=0; for(const row of h) for(const v of row) if(v>0) n++;
    out+=`<div>= <span class="res">${n}</span> 個</div>`;
  }else if(p.view==='front'){
    const cols=[]; for(let c=0;c<h[0].length;c++){ let m=0; for(let r=0;r<h.length;r++) m=Math.max(m,h[r][c]); cols.push(m); }
    out+=`<div><span class="lead">正面</span>每一直行取最高：${cols.map((m,i)=>`第${i+1}行 ${m}`).join('、')}</div>`+
      `<div>${cols.join(' + ')} = <span class="res">${p.answer}</span> 個</div>`;
  }else{
    const rows=[]; for(let r=0;r<h.length;r++){ let m=0; for(let c=0;c<h[0].length;c++) m=Math.max(m,h[r][c]); rows.push(m); }
    out+=`<div><span class="lead">側面</span>每一直列取最高：${rows.map((m,i)=>`第${i+1}列 ${m}`).join('、')}</div>`+
      `<div>${rows.join(' + ')} = <span class="res">${p.answer}</span> 個</div>`;
  }
  return out;
}
function buildTip(){ const p=problem;
  if(p.kind==='reflect') return '對 x軸對稱→上下翻，y 變號；對 y軸對稱→左右翻，x 變號。另一個座標不變。';
  if(p.kind==='axes') return '對稱軸＝對摺後兩邊完全重疊的那條線。平行四邊形沒有對稱軸，別跟「點對稱」搞混。';
  return '三視圖數方格：正面、側面各是「該方向每排最高的積木數」相加；上面是佔地的格子數。';
}

function check(){
  if(entry===''||entry==='-') return;
  answered=true;
  const val=parseInt(entry,10);
  const ans=document.getElementById('ans');
  const correct = val===problem.answer;
  ans.className='ans '+(correct?'ok':'no'); ans.textContent=entry.replace('-','−');
  if(!correct){ ans.classList.add('shake'); setTimeout(()=>ans.classList.remove('shake'),400); }

  streak = correct?streak+1:0;
  document.getElementById('streak').textContent=streak;

  if(window.parent!==window){
    window.parent.postMessage({type:'unit-progress', unitDone:1, unitCorrect:correct?1:0}, '*');
    if(!correct){ window.parent.postMessage({type:'unit-mistake', q:qText(), ans:String(problem.answer), given:entry.replace('-','−'), steps:(typeof buildSteps==='function'?buildSteps():''), tip:(typeof buildTip==='function'?buildTip():'')}, '*'); }
  }

  document.getElementById('steps').innerHTML=buildSteps();
  document.getElementById('numline').innerHTML='';
  document.getElementById('tip').textContent=buildTip();
  document.getElementById('explain').className='explain show';
  const go=document.getElementById('go'); go.textContent='下一題'; go.className='go next';
}
function next(){ problem=makeProblem(level); render(); }

document.getElementById('pad').addEventListener('click',e=>{
  const b=e.target.closest('.key'); if(!b||answered) return; const k=b.dataset.k;
  if(k==='del') entry=entry.slice(0,-1);
  else if(k==='sign') entry = entry.startsWith('-')?entry.slice(1):'-'+entry;
  else { if(entry.replace('-','').length<4) entry+=k; }
  showEntry();
});
document.getElementById('go').addEventListener('click',()=> answered?next():check());
document.querySelectorAll('.lv').forEach(b=>b.addEventListener('click',()=>{
  document.querySelectorAll('.lv').forEach(x=>x.classList.remove('active'));
  b.classList.add('active'); level=b.dataset.lv; next();
}));
document.addEventListener('keydown',e=>{
  if(e.key==='Enter'){ answered?next():check(); return; }
  if(answered) return;
  if(/^[0-9]$/.test(e.key)){ if(entry.replace('-','').length<4) entry+=e.key; showEntry(); }
  else if(e.key==='-'){ entry = entry.startsWith('-')?entry.slice(1):'-'+entry; showEntry(); }
  else if(e.key==='Backspace'){ entry=entry.slice(0,-1); showEntry(); }
});

(function(){ const lv=new URLSearchParams(location.search).get('level');
  if(lv==='basic'||lv==='adv'||lv==='mix'){ level=lv; document.querySelectorAll('.lv').forEach(b=>b.classList.toggle('active',b.dataset.lv===lv)); }
})();

next();
</script>

<script>
/* ===== 遊戲指令介面：外層 RPG 可對本題下技能（hint/fifty）。單獨用瀏覽器開啟時不受影響。 ===== */
(function(){
  function box(){var h=document.getElementById('game-hint');if(!h){h=document.createElement('div');h.id='game-hint';h.style.cssText='margin-top:10px;font-size:13px;background:#fff7ed;border:1.5px solid #fed7aa;color:#9a3412;border-radius:10px;padding:9px 12px;line-height:1.6';var eq=document.getElementById('eq');if(eq&&eq.parentNode){eq.parentNode.insertBefore(h,eq.nextSibling);}else{(document.querySelector('.card')||document.body).appendChild(h);}}return h;}
  function showHint(){if(typeof answered!=='undefined'&&answered)return;var t='';try{t=buildTip();}catch(e){}if(!t)return;box().innerHTML='💡 提示：'+t;}
  function eliminateOne(){showHint();}          /* 數字輸入題：先給弱提示（沿用 buildTip） */
  if(typeof next==='function'){var _n=next;next=function(){var h=document.getElementById('game-hint');if(h)h.remove();return _n.apply(this,arguments);};}
  window.addEventListener('message',function(e){var d=e.data;if(!d||d.type!=='unit-command')return;if(d.cmd==='hint')showHint();if(d.cmd==='fifty')eliminateOne();});
  if(window.parent!==window){window.parent.postMessage({type:'unit-ready',supports:['hint']},'*');}
})();
</script>
<script>
/* ===== exam-mode-hook：綜合測驗模式，?exam=1 時交由外層 runner 控制 ===== */
(function(){
  if(new URLSearchParams(location.search).get('exam')!=='1') return;
  document.documentElement.setAttribute('data-exam','1');
  var lv=document.querySelector('.levels'); if(lv) lv.style.display='none';
  var go=document.getElementById('go'); if(!go) return;
  function upd(){ var isNext=go.classList.contains('next')||(go.textContent||'').indexOf('下一題')>=0;
    go.style.display=isNext?'none':''; }
  upd();
  try{ new MutationObserver(upd).observe(go,{attributes:true,childList:true,characterData:true,subtree:true}); }catch(e){}
})();
</script>
